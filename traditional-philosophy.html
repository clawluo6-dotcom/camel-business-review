<script>
(function(){
  const PAGE_SUBCATEGORY = '一、传统哲学研究';
  const ACCENT = '#22d3ee';
  const PILLAR = 'worldview';

  // Mapping: new subcategory → old subcategories in articles.js
  const CATEGORY_MAP = {
    '一、传统哲学研究': ['（一）、《豆豆三部曲》哲学思想', '（二）、《内圣外王》哲学分析', '（三）、《西游记》哲学思想研究', '（四）、《世界的真相》感悟', '（五）、杂篇'],
    '二、佛学思想研究': ['（一）、佛陀的核心思想', '（二）、佛教思想', '（三）、金刚经', '（四）、中观唯识', '（五）、止观禅定', '（六）、禅宗六祖', '（七）、心与识', '（八）、修行方法'],
    '三、儒家思想研究': ['三、儒家思想研究'],
    '四、自然哲学研究': ['四、自然哲学研究'],
    '一、经济史研究': ['（一）、世界历史研究', '（二）、中国历史研究'],
    '二、宏观经济研究': ['（一）、500年全球大周期', '（二）、经济周期'],
    '三、国际金融研究': ['（一）、国际金融', '（二）、美国研究'],
    '四、中国经济观察': ['（一）、经济观察', '（二）、商业模式']
  };

  function init() {
    var mapped = CATEGORY_MAP[PAGE_SUBCATEGORY] || [];
    var allArticles = (window.__ARTICLES__ && window.__ARTICLES__.articles) || [];
    var filtered = allArticles.filter(function(a) {
      return a.pillar === PILLAR && mapped.indexOf(a.subcategory) !== -1 && !a.id.startsWith('moc-') && !a.title.startsWith('MOC-');
    });
    render(filtered);
  }

  function render(articles) {
    var html = '';
    html += '<div class="mb-6 fade-in" style="animation-delay:0.2s"><h3 class="text-lg font-bold" style="color:'+ACCENT+'">文章列表</h3><p class="text-text-secondary text-sm">共 ' + articles.length + ' 篇</p></div>';

    if (articles.length === 0) {
      html += '<div class="glass rounded-2xl p-12 empty-state"><p class="text-text-muted text-base">该分类暂无文章，敬请期待</p></div>';
    } else {
      html += '<div class="grid grid-cols-1 md:grid-cols-2 gap-5">';
      articles.forEach(function(a, i){
        var impClass = a.importance >= 5 ? 'importance-5' : a.importance >= 4 ? 'importance-4' : 'importance-3';
        html += '<a href="article.html?id='+a.short_id+'" class="glass rounded-xl p-6 glass-hover fade-in '+impClass+' block no-underline" style="animation-delay:'+(0.05*(i+1))+'s">';
        html += '<div class="flex items-center justify-between mb-3">';
        html += '<span class="text-[10px] text-text-muted font-mono">'+(a.date||'')+'</span>';
        if (a.importance >= 5) html += '<span class="text-[10px] px-2 py-0.5 rounded-full" style="background:rgba(34,211,238,0.12);color:#22d3ee">精选</span>';
        html += '</div>';
        html += '<h4 class="font-semibold text-sm mb-2 leading-snug" style="color:'+ACCENT+'">'+a.title+'</h4>';
        html += '<p class="text-xs text-text-secondary leading-relaxed">'+(a.summary||'').substring(0,120)+'</p>';
        html += '</a>';
      });
      html += '</div>';
    }
    document.getElementById('app').innerHTML = html;
  }

  init();
})();
</script>
