<script src="site-data.js"></script>
<script>
(function() {
  const DATA = window.__ARTICLES__;
  if (!DATA || !DATA.articles) return;

  const PILLAR = 'practice';
  const ACCENT_COLOR = '#a855f7';

  const SUB_DESC = {
    '内圣外王': '儒家修身的至高境界——从庄子本源到心相一体，四篇贯通内圣外王的完整思想体系',
    '文化修行': '从豆豆三部曲到西游记——以文化作品为镜，观照自我修行'
  };

  const articles = DATA.articles.filter(a => a.pillar === PILLAR && !a.id.startsWith('moc-') && !a.title.startsWith('MOC-'));
  const groups = {};
  articles.forEach(a => {
    const sc = a.subcategory || '未分类';
    if (!groups[sc]) groups[sc] = [];
    groups[sc].push(a);
  });

  // Smart sort: 按标题中的数字/中文序号排序（一<二<...<十<十一；1<2<10）
  function extractNum(title) {
    var m = title.match(/^(\d+)[-\\.、．\\s·]+/);
    if (m) return parseInt(m[1],10);
    var cn = {一:1,二:2,三:3,四:4,五:5,六:6,七:7,八:8,九:9,十:10};
    m = title.match(/^([一二三四五六七八九十]+)[、，,\\s·]*/);
    if (m) {
      var s = m[1];
      if (s.length===1) return cn[s]||0;
      if (s.length===2) {
        if (s[0]==='十') return 10+(cn[s[1]]||0);
        if (s[1]==='十') return (cn[s[0]]||0)*10;
      }
      if (s.length===3 && s[1]==='十') return (cn[s[0]]||0)*10+(cn[s[2]]||0);
    }
    return 0;
  }
  var collator = new Intl.Collator('zh-Hans-CN', { numeric: true });
  Object.keys(groups).forEach(function(k) {
    groups[k].sort(function(a,b) {
      var na=extractNum(a.title), nb=extractNum(b.title);
      if (na!==nb) return na-nb;
      return collator.compare(a.title, b.title);
    });
  });
  const subKeys = Object.keys(groups).sort();

  const sidebar = document.getElementById('sidebar-nav');
  if (sidebar) {
    sidebar.innerHTML = subKeys.map(key => `
      <button class="sidebar-item w-full text-left px-3 py-2.5 rounded-lg border border-transparent text-sm text-text-secondary flex items-center justify-between"
              data-sub="${key}" onclick="window.__switchSubcategory('${key}')">
        <span>${key}</span>
        <span class="text-xs text-text-muted ml-2 tabular-nums">${groups[key].length}</span>
      </button>
    `).join('');
  }

  const mobile = document.getElementById('mobile-subcategory');
  if (mobile) {
    mobile.innerHTML = subKeys.map(k => `<option value="${k}">${k}（${groups[k].length}篇）</option>`).join('');
    mobile.addEventListener('change', function() { window.__switchSubcategory(this.value); });
  }

  function renderArticles(subKey) {
    const list = groups[subKey] || [];
    const container = document.getElementById('article-list');
    const empty = document.getElementById('empty-state');
    document.getElementById('subcategory-title').textContent = subKey;
    document.getElementById('subcategory-desc').textContent = SUB_DESC[subKey] || '';
    document.getElementById('article-count').textContent = list.length;

    if (list.length === 0) {
      container.innerHTML = '';
      empty.classList.remove('hidden');
    } else {
      empty.classList.add('hidden');
      container.innerHTML = list.map((a, i) => `
        <a href="article.html?id=${a.id}" class="article-row block no-underline glass rounded-lg px-5 py-3.5 border border-white/5 fade-in"
           style="animation-delay: ${i * 0.03}s">
          <div class="flex items-center gap-4">
            <span class="text-xs font-mono w-8 flex-shrink-0" style="color:${ACCENT_COLOR}">${String(i + 1).padStart(2, '0')}</span>
            <div class="flex-1 min-w-0">
              <h4 class="text-sm font-semibold text-text-primary leading-snug truncate">${a.title}</h4>
              <p class="text-xs text-text-muted mt-1 truncate">${(a.tags || []).join(' · ')}</p>
            </div>
            <div class="flex-shrink-0 hidden sm:flex items-center gap-2">
              <span class="text-[10px] text-text-muted font-mono">${a.date || ''}</span>
              <span class="text-[10px] text-text-muted">${a.wordCount || 0}字</span>
            </div>
          </div>
        </a>
      `).join('');
    }

    document.querySelectorAll('.sidebar-item').forEach(el => {
      el.classList.toggle('active', el.dataset.sub === subKey);
    });

    const m = document.getElementById('mobile-subcategory');
    if (m && m.value !== subKey) m.value = subKey;
    window.scrollTo({ top: 200, behavior: 'smooth' });
  }

  window.__switchSubcategory = renderArticles;
  renderArticles(subKeys[0]);
})();
</script>
