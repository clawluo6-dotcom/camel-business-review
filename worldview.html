<script src="articles.js"></script>
<script>
(function() {
  const DATA = window.__ARTICLES__;
  if (!DATA || !DATA.articles) return;

  const ACCENT = '#22d3ee';
  const PILLAR = 'worldview';

  // ---- Module tree definition (matches Obsidian 01-哲学思想研究/) ----
  const MODULE_TREE = [
    {
      module: '传统哲学研究',
      icon: '📜',
      subdirs: [
        { name: '世界的真相', desc: '对宇宙本质、意识本源的系统性追问' },
        { name: '传统哲学', desc: '太极图说、道德经、周易等经典解读' },
        { name: '内圣外王', desc: '内圣外王——修己与治世之道' },
        { name: '西游记', desc: '《西游记》中的修行密码' },
        { name: '豆豆三部曲', desc: '《豆豆三部曲》思想解读' }
      ]
    },
    {
      module: '佛学思想研究',
      icon: '🪷',
      subdirs: [
        { name: '佛陀的核心思想', desc: '八正道、十二因缘、三法印、四圣谛' },
        { name: '佛教思想', desc: '五见、分别心、三界唯心、觉与空' },
        { name: '金刚经', desc: '《金刚般若波罗蜜经》原文与解读' },
        { name: '中观唯识', desc: '龙树中观、唯识学说' },
        { name: '止观禅定', desc: '四禅八定至灭尽定与涅槃' },
        { name: '禅宗六祖', desc: '禅宗传法与顿悟法门' },
        { name: '心与识', desc: '心识运作机制与观心之道' },
        { name: '修行方法', desc: '圣多纳释放法、三破法、漏尽通' }
      ]
    },
    {
      module: '儒家思想研究',
      icon: '📖',
      subdirs: [
        { name: '儒家思想研究', desc: '儒家经典与义理研究' }
      ]
    },
    {
      module: '科学哲学研究',
      icon: '🔬',
      subdirs: [
        { name: '科学哲学研究', desc: '太极波粒、统一场论等科学范式追问' }
      ]
    }
  ];

  // ---- Build lookup: subcategory → { module, subdir } ----
  const subdirMap = {};
  MODULE_TREE.forEach(mod => {
    mod.subdirs.forEach(sd => {
      subdirMap[sd.name] = { module: mod.module, moduleIcon: mod.icon, ...sd };
    });
  });

  // ---- Filter articles ----
  const articles = DATA.articles.filter(a => a.pillar === PILLAR);

  // Group by subcategory
  const bySub = {};
  articles.forEach(a => {
    const sc = a.subcategory || '未分类';
    if (!bySub[sc]) bySub[sc] = [];
    bySub[sc].push(a);
  });

  // Smart sort: 按标题中的数字/中文序号排序（一<二<...<十<十一；1<2<10）
  function extractNum(title) {
    var m = title.match(/^(\d+)[-\\.、．\\s·]+/);
    if (m) return parseInt(m[1],10);
    var cn = {一:1,二:2,三:3,四:4,五:5,六:6,七:7,八:8,九:9,十:10};
    m = title.match(/^([一二三四五六七八九十]+)[、，,\\s·]*/);
    if (m) {
      var s = m[1];
      if (s.length===1) return cn[s]||0;
      if (s.length===2) {
        if (s[0]==='十') return 10+(cn[s[1]]||0);
        if (s[1]==='十') return (cn[s[0]]||0)*10;
      }
      if (s.length===3 && s[1]==='十') return (cn[s[0]]||0)*10+(cn[s[2]]||0);
    }
    return 0;
  }
  var collator = new Intl.Collator('zh-Hans-CN', { numeric: true });
  Object.keys(bySub).forEach(function(k) {
    bySub[k].sort(function(a,b) {
      var na=extractNum(a.title), nb=extractNum(b.title);
      if (na!==nb) return na-nb;
      return collator.compare(a.title, b.title);
    });
  });

  // ---- Build flat folder list for sidebar ----
  // For modules where all subdirs have exactly 1 subdir with same name as module, flatten
  const flatFolders = [];
  MODULE_TREE.forEach(mod => {
    mod.subdirs.forEach(sd => {
      const count = (bySub[sd.name] || []).length;
      flatFolders.push({
        label: sd.name,
        module: mod.module,
        moduleIcon: mod.icon,
        desc: sd.desc,
        count: count,
        subcat: sd.name,
      });
    });
  });

  // ---- Render sidebar tree ----
  function buildSidebar() {
    const sidebar = document.getElementById('sidebar-tree');
    if (!sidebar) return;

    let html = '';
    let currentModule = '';
    MODULE_TREE.forEach(mod => {
      // Module header
      const modArticles = mod.subdirs.reduce((sum, sd) => sum + (bySub[sd.name] || []).length, 0);
      html += `<div class="tree-module flex items-center gap-2 px-2 py-2 mt-3 first:mt-0 rounded text-xs font-bold text-text-muted">
        <span>${mod.icon}</span>
        <span class="flex-1">${mod.module}</span>
        <span class="tree-count">${modArticles}篇</span>
      </div>`;

      // Subdirs
      mod.subdirs.forEach(sd => {
        const count = (bySub[sd.name] || []).length;
        html += `<button class="tree-subdir w-full text-left px-2 py-1.5 pl-6 rounded text-sm text-text-secondary flex items-center justify-between border-l border-transparent"
                data-sub="${sd.name}" onclick="window.__selectFolder('${sd.name}')">
          <span class="truncate">${sd.name}</span>
          <span class="tree-count ml-2 flex-shrink-0">${count}</span>
        </button>`;
      });
    });

    sidebar.innerHTML = html;
  }

  // ---- Render article list for a subfolder ----
  function renderArticles(subKey) {
    const list = bySub[subKey] || [];
    const info = subdirMap[subKey] || { module: '', moduleIcon: '📁', desc: '' };
    const container = document.getElementById('article-list');
    const empty = document.getElementById('empty-state');
    const countEl = document.getElementById('article-count');
    const titleEl = document.getElementById('folder-title');
    const pathEl = document.getElementById('folder-path');
    const iconEl = document.getElementById('folder-icon');

    if (titleEl) titleEl.textContent = subKey;
    if (pathEl) pathEl.textContent = info.module ? `${info.module} / ${subKey}` : subKey;
    if (iconEl) iconEl.textContent = info.moduleIcon || '📁';
    if (countEl) countEl.textContent = list.length;

    if (list.length === 0) {
      container.innerHTML = '';
      if (empty) empty.classList.remove('hidden');
    } else {
      if (empty) empty.classList.add('hidden');
      container.innerHTML = list.map((a, i) => `
        <a href="article.html?id=${a.id}" class="article-row block no-underline glass rounded-lg px-5 py-3.5 border border-white/5 fade-in"
           style="animation-delay:${i * 0.03}s;text-decoration:none;">
          <div class="flex items-center gap-4">
            <span class="text-xs font-mono w-8 flex-shrink-0" style="color:${ACCENT}">${String(i + 1).padStart(2, '0')}</span>
            <div class="flex-1 min-w-0">
              <h4 class="text-sm font-semibold text-text-primary leading-snug truncate">${a.title}</h4>
              <p class="text-xs text-text-muted mt-1 truncate">${(a.tags || []).join(' · ')}</p>
            </div>
            <div class="flex-shrink-0 hidden sm:flex items-center gap-2">
              <span class="text-[10px] text-text-muted font-mono">${a.date || ''}</span>
              <span class="text-[10px] text-text-muted">${a.wordCount || 0}字</span>
            </div>
          </div>
        </a>
      `).join('');
    }

    // Update active
    document.querySelectorAll('.tree-subdir').forEach(el => {
      el.classList.toggle('active', el.dataset.sub === subKey);
    });

    // Update mobile
    const mobile = document.getElementById('mobile-selector');
    if (mobile && mobile.value !== subKey) {
      mobile.value = subKey;
    }

    window.scrollTo({ top: 200, behavior: 'smooth' });
  }

  // ---- Mobile selector ----
  function buildMobile() {
    const sel = document.getElementById('mobile-selector');
    if (!sel) return;
    let opts = '';
    MODULE_TREE.forEach(mod => {
      opts += `<optgroup label="${mod.module}">`;
      mod.subdirs.forEach(sd => {
        opts += `<option value="${sd.name}">${sd.name}（${(bySub[sd.name]||[]).length}篇）</option>`;
      });
      opts += '</optgroup>';
    });
    sel.innerHTML = opts;
    sel.addEventListener('change', function() {
      window.__selectFolder(this.value);
    });
  }

  // Expose
  window.__selectFolder = renderArticles;

  // Init
  buildSidebar();
  buildMobile();

  // Default: first subdir with articles, or first overall
  const first = flatFolders.find(f => f.count > 0) || flatFolders[0];
  if (first) renderArticles(first.subcat);
})();
</script>
