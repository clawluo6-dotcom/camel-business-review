<script src="site-data.js"></script>
<script>
(function() {
  const DATA = window.__ARTICLES__;
  if (!DATA || !DATA.articles) return;

  const ACCENT = '#fbbf24';
  const PILLAR = 'social';

  // ---- Module tree: 从 site-data.js 的 pillarModules 动态构建（单一数据源） ----
  const PILLAR_MODULES = (DATA.pillarModules && DATA.pillarModules[PILLAR]) || [];
  const MODULE_TREE = PILLAR_MODULES.map(pm => ({
    module: pm.module,
    icon: pm.icon,
    subdirs: pm.subcategories.map(sc => ({ name: sc, dataSubcat: sc, desc: sc }))
  }));

  // ---- Build flat mapping ----
  const folderMap = {}; // folderName → { module, icon, dataSubcat, desc }
  MODULE_TREE.forEach(mod => {
    mod.subdirs.forEach(sd => {
      folderMap[sd.name] = { module: mod.module, icon: mod.icon, dataSubcat: sd.dataSubcat || sd.name, desc: sd.desc };
    });
  });

  // ---- Filter articles (non-MOC for main list) ----
  const articles = DATA.articles.filter(a => a.pillar === PILLAR && !a.id.startsWith('moc-') && !a.title.startsWith('MOC-'));

  // Group by subcategory (non-MOC for article list)
  const bySub = {};
  articles.forEach(a => {
    const sc = a.subcategory || '未分类';
    if (!bySub[sc]) bySub[sc] = [];
    bySub[sc].push(a);
  });

  // Group ALL articles by subcategory (including MOC, for sidebar module counting)
  const allArticles = DATA.articles.filter(a => a.pillar === PILLAR);
  const bySubAll = {};
  allArticles.forEach(a => {
    const sc = a.subcategory || '未分类';
    if (!bySubAll[sc]) bySubAll[sc] = [];
    bySubAll[sc].push(a);
  });

  // Smart sort: 按标题中的数字/中文序号排序（一<二<...<十<十一；1<2<10）
  // Also handles numbers inside parentheses like "AI 融资（一）" → 1
  function extractNum(title) {
    // Parenthesized number anywhere: （一）（二） 1）（10） etc
    var parM = title.match(/[(（]([一二三四五六七八九十零〇0-9]+)[）)]/) || title.match(/[、][ ]*([一二三四五六七八九十零〇0-9]+)[ ）]/);
    if (parM) {
      var ps = parM[1];
      var cnP = {一:1,二:2,三:3,四:4,五:5,六:6,七:7,八:8,九:9,十:10,零:0,〇:0};
      if (/^[0-9]+$/.test(ps)) return parseInt(ps, 10);
      if (cnP[ps]) return cnP[ps];
    }
    // Leading Arabic number: "01-" "1-" "01·"
    var m = title.match(/^(\d+)[-\\.、．\\s·]+/);
    if (m) return parseInt(m[1],10);
    // Leading Chinese numeral: "一、" "八、" "十二、"
    var cn = {一:1,二:2,三:3,四:4,五:5,六:6,七:7,八:8,九:9,十:10};
    m = title.match(/^([一二三四五六七八九十]+)[、，,\\s·]*/);
    if (m) {
      var s = m[1];
      if (s.length===1) return cn[s]||0;
      if (s.length===2) {
        if (s[0]==='十') return 10+(cn[s[1]]||0);
        if (s[1]==='十') return (cn[s[0]]||0)*10;
      }
      if (s.length===3 && s[1]==='十') return (cn[s[0]]||0)*10+(cn[s[2]]||0);
    }
    // Any digits at start
    m = title.match(/^(\d+)/);
    if (m) return parseInt(m[1],10);
    return 0;
  }
  var collator = new Intl.Collator('zh-Hans-CN', { numeric: true });
  Object.keys(bySub).forEach(function(k) {
    bySub[k].sort(function(a,b) {
      var na=extractNum(a.title), nb=extractNum(b.title);
      if (na!==nb) return na-nb;
      return collator.compare(a.title, b.title);
    });
  });

  // ---- Render sidebar tree ----
  function buildSidebar() {
    const sidebar = document.getElementById('sidebar-tree');
    if (!sidebar) return;

    let html = '';
    MODULE_TREE.forEach(mod => {
      // 只保留有文章的子目录（用 bySubAll 包含 MOC，确保目录页也能被统计）
      const activeSubdirs = mod.subdirs.filter(sd => (bySubAll[sd.dataSubcat] || []).length > 0);
      if (activeSubdirs.length === 0) return; // 跳过整组空的 module

      const modTotal = activeSubdirs.reduce((sum, sd) => sum + (bySubAll[sd.dataSubcat] || []).length, 0);
      html += `<div class="tree-module flex items-center gap-2 px-2 py-2 mt-3 first:mt-0 rounded text-xs font-bold text-text-muted">
        <span>${mod.icon}</span>
        <span class="flex-1">${mod.module}</span>
        <span class="tree-count">${modTotal}篇</span>
      </div>`;

      activeSubdirs.forEach(sd => {
        const count = (bySubAll[sd.dataSubcat] || []).length;
        html += `<button class="tree-subdir w-full text-left px-2 py-1.5 pl-6 rounded text-sm text-text-secondary flex items-center justify-between border-l border-transparent"
                data-folder="${sd.name}" onclick="window.__selectFolder('${sd.name}')">
          <span class="truncate">${sd.name}</span>
          <span class="tree-count ml-2 flex-shrink-0">${count}</span>
        </button>`;
      });
    });

    sidebar.innerHTML = html;
  }

  // ---- Render articles for a folder ----
  function renderArticles(folderName) {
    const info = folderMap[folderName] || { dataSubcat: folderName, module: '', icon: '📁', desc: '' };
    const list = bySub[info.dataSubcat] || [];
    const container = document.getElementById('article-list');
    const empty = document.getElementById('empty-state');
    const countEl = document.getElementById('article-count');
    const titleEl = document.getElementById('folder-title');
    const pathEl = document.getElementById('folder-path');
    const iconEl = document.getElementById('folder-icon');

    if (titleEl) titleEl.textContent = folderName;
    if (pathEl) pathEl.textContent = info.module ? `${info.module} / ${folderName}` : folderName;
    if (iconEl) { iconEl.textContent = info.icon || '📁'; iconEl.style.color = ACCENT; }
    if (titleEl) titleEl.style.color = ACCENT;
    if (countEl) { countEl.textContent = list.length; countEl.style.color = ACCENT; }

    if (list.length === 0) {
      container.innerHTML = '';
      if (empty) empty.classList.remove('hidden');
    } else {
      if (empty) empty.classList.add('hidden');
      container.innerHTML = list.map((a, i) => `
        <a href="article.html?id=${a.id}" class="article-row block no-underline glass rounded-lg px-5 py-3.5 border border-white/5 fade-in"
           style="animation-delay:${i * 0.03}s;text-decoration:none;">
          <div class="flex items-center gap-4">
            <span class="article-index text-xs font-mono w-8 flex-shrink-0" style="color:${ACCENT}">${String(i + 1).padStart(2, '0')}</span>
            <div class="flex-1 min-w-0">
              <h4 class="text-sm font-semibold text-text-primary leading-snug truncate">${a.title}</h4>
              <p class="text-xs text-text-muted mt-1 truncate">${(a.tags || []).join(' · ')}</p>
            </div>
            <div class="flex-shrink-0 hidden sm:flex items-center gap-2">
              <span class="text-[10px] text-text-muted font-mono">${a.date || ''}</span>
              <span class="text-[10px] text-text-muted">${a.wordCount || 0}字</span>
            </div>
          </div>
        </a>
      `).join('');
    }

    // Update active
    document.querySelectorAll('.tree-subdir').forEach(el => {
      el.classList.toggle('active', el.dataset.folder === folderName);
    });

    // Update mobile
    if (mobileSelected !== folderName && window.__setMobileSelected) {
      window.__setMobileSelected(folderName);
    }

    window.scrollTo({ top: 200, behavior: 'smooth' });
  }

  // ---- Mobile selector (custom dropdown) ----
  let mobileSelected = null;
  function buildMobile() {
    const trigger = document.getElementById('mobile-selector-trigger');
    const dropdown = document.getElementById('mobile-selector-dropdown');
    const textEl = document.getElementById('mobile-selector-text');
    if (!trigger || !dropdown) return;

    let html = '';
    MODULE_TREE.forEach(mod => {
      html += `<div style="padding:6px 14px 4px;font-size:11px;font-weight:700;color:#A80606;letter-spacing:0.5px;border-top:1px solid var(--ink-border,#d4c9b8);margin-top:2px;">${mod.module}</div>`;
      mod.subdirs.forEach(sd => {
        html += `<div class="mob-opt" data-val="${sd.name}" style="padding:10px 14px 10px 24px;font-size:13px;color:var(--ink-primary,#251401);cursor:pointer;border-radius:8px;margin:2px 8px;transition:background .15s;">${sd.name}</div>`;
      });
    });
    dropdown.innerHTML = html;

    trigger.addEventListener('click', function(e) {
      e.stopPropagation();
      const open = dropdown.style.display === 'block';
      dropdown.style.display = open ? 'none' : 'block';
    });

    dropdown.addEventListener('click', function(e) {
      const opt = e.target.closest('.mob-opt');
      if (!opt) return;
      const val = opt.getAttribute('data-val');
      mobileSelected = val;
      textEl.textContent = val;
      textEl.style.color = '#A80606';
      dropdown.style.display = 'none';
      window.__selectFolder(val);
    });

    dropdown.addEventListener('mouseover', function(e) {
      const opt = e.target.closest('.mob-opt');
      if (opt) opt.style.background = 'var(--ink-hover,#e8dfd0)';
    });
    dropdown.addEventListener('mouseout', function(e) {
      const opt = e.target.closest('.mob-opt');
      if (opt) opt.style.background = '';
    });

    document.addEventListener('click', function() {
      dropdown.style.display = 'none';
    });
  }

  window.__setMobileSelected = function(val) {
    mobileSelected = val;
    const textEl = document.getElementById('mobile-selector-text');
    if (textEl) { textEl.textContent = val; textEl.style.color = '#A80606'; }
  };

  window.__selectFolder = renderArticles;

  buildSidebar();
  buildMobile();

  // Default: first folder with articles
  const flatFolders = [];
  MODULE_TREE.forEach(mod => {
    mod.subdirs.forEach(sd => {
      flatFolders.push({ name: sd.name, count: (bySub[sd.dataSubcat] || []).length });
    });
  });
  const first = flatFolders.find(f => f.count > 0) || flatFolders[0];
  if (first) renderArticles(first.name);
})();
</script>
