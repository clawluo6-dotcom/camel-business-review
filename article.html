<!DOCTYPE html>
<html lang="zh-CN" class="scholar" data-nav="article">
<head>
<meta charset="UTF-8">
  <link rel="stylesheet" href="styles.css">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>文章详情 — 骆驼商业本质</title>
  
  
<link rel="icon" type="image/svg+xml" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🐫</text></svg>">

<script src="js/marked.min.js"></script>
<style>
  .fade-in { animation: fadeIn 0.6s ease-out; }
  @keyframes fadeIn { from { opacity:0; transform:translateY(12px); } to { opacity:1; transform:translateY(0); } }
  .back-link { transition: all 0.3s ease; }
  .back-link:hover { transform: translateX(-4px); }
  /* Article typography — 字体缩小 15% (×0.85)，间距拉大 */
  .article-body { max-width: 780px; }
  .article-body h1 { font-size: 1.7rem; font-weight: 800; margin-bottom: 1.4rem; margin-top: 1.8rem; line-height: 1.25; }
  .article-body h2 { font-size: 1.28rem; font-weight: 700; margin-bottom: 1rem; margin-top: 2.2rem; line-height: 1.35; }
  .article-body h3 { font-size: 1.02rem; font-weight: 600; margin-bottom: 0.75rem; margin-top: 1.8rem; line-height: 1.35; }
  .article-body h4 { font-size: 1.05rem; font-weight: 700; margin-bottom: 0.5rem; margin-top: 1.5rem; line-height: 1.35; color: #22d3ee; }
  .article-body p { font-size: 0.89rem; line-height: 1.65; margin-bottom: 1.35rem; color: #94a3b8; }
  .article-body blockquote { border-left: 3px solid rgba(255,255,255,0.15); padding: 0.7rem 1.15rem; margin: 1.4rem 0; background: rgba(255,255,255,0.03); border-radius: 0 8px 8px 0; font-style: italic; color: #94a3b8; }
  .article-body blockquote p { color: #94a3b8; font-size: 0.85rem; margin-bottom: 0.45rem; }
  .article-body ul, .article-body ol { margin: 0.95rem 0 1.4rem 1.5rem; }
  .article-body li { font-size: 0.89rem; line-height: 1.65; margin-bottom: 0.35rem; color: #94a3b8; }
  .article-body strong { color: #e2e8f0; }
  .article-body hr { border: none; height: 1px; margin: 2.2rem 0; background: linear-gradient(90deg, transparent, rgba(255,255,255,0.1), transparent); }
  .article-body code { background: rgba(255,255,255,0.06); padding: 2px 6px; border-radius: 4px; font-family: monospace; font-size: 0.9em; }
  .article-body table { width: 100%; border-collapse: collapse; margin: 1.4rem 0; font-size: 0.85rem; }
  .article-body th { background: rgba(255,255,255,0.06); padding: 0.55rem 0.9rem; text-align: left; font-weight: 600; border-bottom: 2px solid rgba(255,255,255,0.1); }
  .article-body td { padding: 0.45rem 0.9rem; border-bottom: 1px solid rgba(255,255,255,0.05); color: #94a3b8; }
  .article-title { color: #22d3ee; }
</style>
<script src="site-data.js"></script>
<script>
// 动态加载文章正文：先解析文章 ID，确定 pillar，只加载对应文件
(function() {
  var id = (new URLSearchParams(window.location.search)).get('id') || '';
  if (!id) { window.__ARTICLE_CONTENT__ = {}; window.__ARTICLE_FETCH__ = Promise.resolve(true); return; }

  // 先创建等待中的 Promise，init() 会通过 .then() 等它完成
  var resolveFetch;
  window.__ARTICLE_FETCH__ = new Promise(function(r) { resolveFetch = r; });

  // 从 site-data.js（已加载）查找文章元数据
  var arts = (window.__ARTICLES__ && (window.__ARTICLES__.articles || window.__ARTICLES__)) || [];
  var meta = arts.find(function(a) { return a.id === id || a.id.endsWith('-' + id) || a.short_id === id; });
  var pillarFile = 'article-content.js'; // 默认完整文件
  if (meta && meta.pillar) {
    pillarFile = 'article-content-' + meta.pillar + '.js';
  }

  var s = document.createElement('script');
  s.src = pillarFile;
  s.onload = s.onreadystatechange = function() {
    // 兼容旧格式
    if (typeof window.__ARTICLE_CONTENT__ !== 'object') {
      if (typeof articleContent !== 'undefined') {
        window.__ARTICLE_CONTENT__ = articleContent;
      } else {
        window.__ARTICLE_CONTENT__ = {};
      }
    }
    if (resolveFetch) resolveFetch(true);
  };
  // 如果拆分文件加载失败，回退到主文件
  s.onerror = function() {
    if (pillarFile !== 'article-content.js') {
      s.src = 'article-content.js';
      s.onerror = null;
    }
  };
  document.head.appendChild(s);
})();
</script>
</head>
<body class="bg-bg-primary bg-grid min-h-screen bg-glow-top">

<!-- NAV -->
<div id="site-nav"></div>

<!-- Article Body -->
<div class="max-w-4xl mx-auto px-6 pt-12 pb-20">
  <div id="app">
    <div class="text-center text-text-muted py-20">加载中...</div>
  </div>
</div>

<!-- FOOTER -->
<footer class="border-t border-white/5 mt-8 bg-bg-secondary/50">
  <div class="max-w-7xl mx-auto px-6 py-8 flex flex-col md:flex-row items-center justify-between gap-4">
    <div class="flex items-center gap-2 text-sm text-text-muted">
      <span class="gradient-text font-bold">骆驼</span>🐫 <span class="gradient-text font-bold">商业本质</span>
      <span>·</span>
      <span class="site-slogan">认识世界 · 理解社会 · 安顿自己</span>
    </div>
    <div class="flex items-center gap-4 text-xs text-text-muted">
      <a href="index.html" class="hover:text-accent-cyan transition">首页</a>
      <span>·</span>
      <a href="worldview.html" class="hover:text-accent-cyan transition">世界观</a>
      <span>·</span>
      <a href="social.html" class="hover:text-accent-gold transition">经济逻辑</a>
      <span>·</span>
      <a href="practice.html" class="hover:text-accent-purple transition">思想与修行</a>
    </div>
  </div>
</footer>

<script>
const PILLAR_CONFIG = {
  worldview: {
    name: '🌌 世界观', slug: 'worldview.html', accent: '#22d3ee', accentRgb: '34,211,238'
  },
  social: {
    name: '🏛️ 经济逻辑', slug: 'social.html', accent: '#f59e0b', accentRgb: '245,158,11'
  },
  practice: {
    name: '🧘 思想与修行', slug: 'practice.html', accent: '#a855f7', accentRgb: '168,85,247'
  }
};

// Configure marked
marked.setOptions({ breaks: true, gfm: true });

// Process article navigation links: convert "← 下一篇：标题" or "→ 下一篇 → 标题" to clickable links
function processNavLinks(content) {
  if (!content) return content;

  // Pattern 1: "← 上一篇：标题" or "← 上一篇：无（本系列首篇）"
  content = content.replace(/← 上一篇：([^|\n]+)(?:\|([^|\n]+))?/g, function(match, title, linkText) {
    return '← 上一篇：<span class="nav-link">' + (linkText || title) + '</span>';
  });

  // Pattern 2: "→ 下一篇 → 标题" or "→ 下一篇：标题"
  content = content.replace(/(?:→ 下一页|→ 下一篇)[：→]\s*([^|\n]+)(?:\|([^|\n]+))?/g, function(match, title, linkText) {
    return '→ 下一篇：<span class="nav-link">' + (linkText || title) + '</span>';
  });

  // Pattern 3: "[[文章标题]]" wikilinks
  content = content.replace(/\[\[([^\]|]+)(?:\|([^\]]+))?\]\]/g, function(match, title, linkText) {
    // Skip image files
    if (/\.(jpg|png|gif|webp|jpeg)$/i.test(title)) {
      return match;
    }
    // Skip MOC references
    if (/^MOC/i.test(title)) {
      return '';
    }
    // Convert to link — look up article by title to get short hash
    var text = linkText || title;
    var arts = (window.__ARTICLES__ && (window.__ARTICLES__.articles || window.__ARTICLES__)) || [];
    var found = arts.find(function(a) { return a.title === title; });
    var shortId = found ? found.short_id : encodeURIComponent(title);
    return '<a href="article.html?id=' + shortId + '" class="nav-link">' + text + '</a>';
  });

  return content;
}

function init() {
  const params = new URLSearchParams(window.location.search);
  const id = params.get('id') || '';

  if (!id) {
    document.getElementById('app').innerHTML = '<div class="glass rounded-2xl p-12 text-center"><p class="text-text-muted text-lg">未找到文章 ID</p></div>';
    return;
  }

  try {
    const data = window.__ARTICLES__;
    const articles = data.articles || data;
    let meta = articles.find(a => a.id === id);
    if (!meta) meta = articles.find(a => a.id.endsWith('-' + id));   // 短哈希 URL
    if (!meta) meta = articles.find(a => a.title === id);             // wikilink 标题
    if (!meta) {
      document.getElementById('app').innerHTML = '<div class="glass rounded-2xl p-12 text-center"><p class="text-text-muted text-lg">文章未找到: ' + id + '</p></div>';
      return;
    }
    // 使用预加载的数据（如果已完成），否则重新 fetch
    function renderContent(d) {
      // 数据加载异常保护
      if (typeof window.__ARTICLE_CONTENT__ !== 'object') {
        document.getElementById('app').innerHTML = '<div class="glass rounded-2xl p-12 text-center fade-in"><p class="text-lg" style="color:#94a3b8">⚠️ 文章内容加载异常</p><p class="text-sm mt-2" style="color:#64748b">请刷新页面重试，如果持续出现请联系站长</p></div>';
        return;
      }
      var content = window.__ARTICLE_CONTENT__ && window.__ARTICLE_CONTENT__[meta.id];
      if (!content) {
        content = '> ⚠️ 这篇文章正文数据暂不可用。';
      }
      render(meta, content);
    }
    if (window.__ARTICLE_FETCH__) {
      window.__ARTICLE_FETCH__.then(renderContent).catch(function() { renderContent(null); });
    } else {
      renderContent(null);
    }
  } catch (err) {
    document.getElementById('app').innerHTML = '<div class="glass rounded-2xl p-12 text-center"><p class="text-text-muted text-lg">数据加载失败: ' + err.message + '</p></div>';
  }
}

function render(article, content) {
  const cfg = PILLAR_CONFIG[article.pillar];
  // 防护：cfg 为 undefined 时给默认值，避免页面出现 "undefined" 字符串
  const acc = cfg ? cfg.accent : '#f59e0b';
  const accRgb = cfg ? cfg.accentRgb : '245,158,11';
  const slug = cfg ? cfg.slug : 'worldview.html';
  const pillarName = cfg ? cfg.name : '世界观';
  document.title = `${article.title} — 骆驼商业本质`;

  // ── Open Graph 动态标签 ──────────────────────────
  // 清理旧 OG 标签（防止多次 render 重复添加）
  document.querySelectorAll('meta[property^="og:"]').forEach(el => el.remove());
  var ogTags = [
    ['og:title', article.title + ' — 骆驼商业本质'],
    ['og:description', article.summary || article.title],
    ['og:type', 'article'],
    ['og:url', window.location.href],
    ['og:site_name', '骆驼商业本质'],
  ];
  ogTags.forEach(function(t) {
    var m = document.createElement('meta');
    m.setAttribute('property', t[0]);
    m.setAttribute('content', t[1]);
    document.head.appendChild(m);
  });

  let html = '';

  // Breadcrumb
  if (cfg) {
    html += `
    <div class="mb-8 fade-in">
      <a href="index.html" class="back-link inline-flex items-center gap-2 text-sm text-text-muted hover:opacity-70 transition" style="color:${acc}">← 返回首页</a>
      <span class="text-text-muted mx-2">/</span>
      <a href="${slug}" class="text-sm hover:underline transition" style="color:${acc}">${pillarName}</a>
    `;
    if (article.subcategory) {
      html += `
      <span class="text-text-muted mx-2">/</span>
      <a href="category.html?pillar=${article.pillar}&cat=${encodeURIComponent(article.subcategory)}" class="text-sm hover:underline transition" style="color:${acc}">${article.subcategory}</a>
      `;
    }
    html += `</div>`;
  }

  // Header card
  html += `
  <div class="glass rounded-2xl p-8 mb-8 fade-in" style="border-left: 3px solid ${acc}">
    <div class="flex items-center gap-3 mb-4">
      <span class="px-3 py-1 rounded-full text-xs font-medium border" style="border-color:rgba(${accRgb},0.3);color:${acc};background:rgba(${accRgb},0.08);">${article.category || ''}</span>
      <span class="text-xs text-text-muted">${article.date || ''}</span>
      ${article.importance >= 5 ? '<span class="text-xs px-2 py-0.5 rounded-full" style="background:rgba(34,211,238,0.12);color:#22d3ee">精选</span>' : ''}
    </div>
    <h1 class="text-2xl font-extrabold leading-snug article-title">${article.title}</h1>
    ${article.summary ? `<p class="mt-3 text-text-secondary leading-relaxed text-base">${article.summary}</p>` : ''}
  </div>`;

  // Article content - process nav links first
  var processedContent = processNavLinks(content);
  html += `
  <div class="glass rounded-2xl p-8 md:p-10 fade-in article-body" style="animation-delay:0.1s">
    ${marked.parse(processedContent || '')}
  </div>`;

  // Back button
  html += `
  <div class="mt-8 text-center">
    <a href="category.html?pillar=${article.pillar}&cat=${encodeURIComponent(article.subcategory || '')}" class="inline-flex items-center gap-2 px-6 py-3 rounded-xl glass-hover text-sm font-medium transition" style="color:${acc};border-color:rgba(${accRgb},0.2);background:rgba(${accRgb},0.06);border:1px solid rgba(${accRgb},0.2);">
      ← 返回「${article.subcategory || '分类'}」文章列表
    </a>
  </div>`;

  // Cusdis 评论区
  var pageId = article.id || window.location.search;
  html += `
  <div class="mt-12 fade-in" style="animation-delay:0.2s">
    <div class="glass rounded-2xl p-6 md:p-8">
      <h2 class="text-xl font-bold mb-4" style="color:${acc}">💬 评论区</h2>
      <div id="cusdis_thread"
        data-host="https://cusdis.com"
        data-app-id="e75bee9b-7505-440d-9a73-e9ccd1d68f7b"
        data-page-id="${pageId}"
        data-page-url="${window.location.href}"
        data-page-title="${article.title}"
        data-theme="${document.documentElement.classList.contains('scholar') ? 'light' : 'dark'}"
        data-lang="zh-CN"
        data-css="${new URL('cusdis-theme.css', window.location.href).href}"
      ></div>
    </div>
  </div>`;

  document.getElementById('app').innerHTML = html;
}

init();
// 加载超时：8 秒后如果页面仍是"加载中..."，显示可操作提示
setTimeout(function() {
  var app = document.getElementById('app');
  if (app && app.innerHTML.indexOf('加载中') !== -1) {
    app.innerHTML =
      '<div class="glass rounded-2xl p-12 text-center fade-in" style="max-width:480px;margin:3rem auto">' +
      '<p class="text-lg" style="color:#f59e0b">⏳ 页面加载超时</p>' +
      '<p class="text-sm mt-2 text-text-muted">数据文件可能较大或网络较慢，<br>请尝试 <a href="javascript:location.reload()" class="underline" style="color:#22d3ee">刷新页面</a></p>' +
      '</div>';
  }
}, 20000);

// === Cusdis 评论系统 ===
// 页面渲染完成后加载 Cusdis 脚本
setTimeout(function() {
  if (!window.CUSDIS_LOADED) {
    var s = document.createElement('script');
    s.src = 'https://cusdis.com/js/cusdis.es.js';
    s.async = true;
    document.body.appendChild(s);
    window.CUSDIS_LOADED = true;
  }
}, 500);

// 主题切换时更新 Cusdis 主题
window.addEventListener('camel-theme-changed', function(e) {
  var theme = e.detail === 'scholar' ? 'light' : 'dark';
  var thread = document.getElementById('cusdis_thread');
  if (thread) {
    thread.setAttribute('data-theme', theme);
  }
  // 通知 Cusdis iframe 更新主题
  var iframe = document.querySelector('#cusdis_thread iframe');
  if (iframe && iframe.contentWindow) {
    iframe.contentWindow.postMessage({ type: 'setTheme', theme: theme }, '*');
  }
});
</script>
  <script src="components.js"></script>
  <script src="theme-toggle.js"></script>
</body>
</html>
