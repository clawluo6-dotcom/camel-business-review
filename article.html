  .article-body table { width: 100%; border-collapse: collapse; margin: 1.25rem 0; font-size: 0.79rem; }

</style>
<script src="site-data.js"></script>
<script>
// 尽早开始加载文章正文（与 CSS/JS 并行下载）
(function() {
  var id = (new URLSearchParams(window.location.search)).get('id') || '';
  if (!id) return;
  var safeName = id.replace(/[\\\\/*?:\"<>|]/g, '_');
  window.__ARTICLE_FETCH__ = fetch('data/articles/' + encodeURIComponent(safeName) + '.json')
    .then(function(r) { if (!r.ok) throw new Error(); return r.json(); })
    .then(function(d) { window.__ARTICLE_DATA__ = d; return d; })
    .catch(function() { window.__ARTICLE_DATA__ = null; });
})();
</script>
</head>

<!-- Article Body -->
<div class="max-w-4xl mx-auto px-6 pt-12 pb-20">

</div>

<!-- FOOTER -->
<footer class="border-t border-white/5 mt-8 bg-bg-secondary/50">
  <div class="max-w-7xl mx-auto px-6 py-8 flex flex-col md:flex-row items-center justify-between gap-4">
    <div class="flex items-center gap-2 text-sm text-text-muted">
      <span class="gradient-text font-bold">骆驼</span>🐫 <span class="gradient-text font-bold">商业本质</span>

      <a href="index.html" class="hover:text-accent-cyan transition">首页</a>

<script>
const PILLAR_CONFIG = {
  worldview: {
    name: '🌌 世界观', slug: 'worldview.html', accent: '#22d3ee', accentRgb: '34,211,238'
  },
  social: {
    name: '🏛️ 社会逻辑', slug: 'social.html', accent: '#f59e0b', accentRgb: '245,158,11'
  },
  practice: {
    name: '🧘 思想与修行', slug: 'practice.html', accent: '#a855f7', accentRgb: '168,85,247'
  }
};

// Configure marked
marked.setOptions({ breaks: true, gfm: true });

function init() {
  const params = new URLSearchParams(window.location.search);
  const id = params.get('id') || '';

  if (!id) {
    document.getElementById('app').innerHTML = '<div class="glass rounded-2xl p-12 text-center"><p class="text-text-muted text-lg">未找到文章 ID</p></div>';
    return;
  }

  try {
    const data = window.__ARTICLES__;
    const articles = data.articles || data;
    const meta = articles.find(a => a.id === id);
    if (!meta) {
      document.getElementById('app').innerHTML = '<div class="glass rounded-2xl p-12 text-center"><p class="text-text-muted text-lg">文章未找到: ' + id + '</p></div>';
      return;
    }
    // 使用预加载的数据（如果已完成），否则重新 fetch
    function renderContent(d) {
      render(meta, d && d.content ? d.content : '');
    }
    if (window.__ARTICLE_FETCH__) {
      window.__ARTICLE_FETCH__.then(renderContent).catch(function() { renderContent(null); });
    } else {
      renderContent(null);
    }
  } catch (err) {
    document.getElementById('app').innerHTML = '<div class="glass rounded-2xl p-12 text-center"><p class="text-text-muted text-lg">数据加载失败: ' + err.message + '</p></div>';
  }
}

function render(article, content) {
  const cfg = PILLAR_CONFIG[article.pillar];
  const acc = cfg ? cfg.accent : '#f59e0b';
  document.title = `${article.title} — 骆驼商业本质`;

  let html = '';

  // Breadcrumb
  if (cfg) {
    html += `
    <div class="mb-8 fade-in">
      <a href="index.html" class="back-link inline-flex items-center gap-2 text-sm text-text-muted hover:opacity-70 transition" style="color:${acc}">← 返回首页</a>
      <span class="text-text-muted mx-2">/</span>
      <a href="${cfg.slug}" class="text-sm hover:underline transition" style="color:${acc}">${cfg.name}</a>
    `;
    if (article.subcategory) {
      html += `
      <span class="text-text-muted mx-2">/</span>
      <a href="category.html?pillar=${article.pillar}&cat=${encodeURIComponent(article.subcategory)}" class="text-sm hover:underline transition" style="color:${acc}">${article.subcategory}</a>
      `;
    }
    html += `</div>`;
  }

  // Header card
  html += `
  <div class="glass rounded-2xl p-8 mb-8 fade-in" style="border-left: 3px solid ${acc}">
    <div class="flex items-center gap-3 mb-4">
      <span class="px-3 py-1 rounded-full text-xs font-medium border" style="border-color:rgba(${cfg.accentRgb},0.3);color:${acc};background:rgba(${cfg.accentRgb},0.08);">${article.category || ''}</span>
      <span class="text-xs text-text-muted">${article.date || ''}</span>
      ${article.importance >= 5 ? '<span class="text-xs px-2 py-0.5 rounded-full" style="background:rgba(34,211,238,0.12);color:#22d3ee">精选</span>' : ''}
    </div>
    <h1 class="text-xl font-extrabold leading-snug article-title">${article.title}</h1>
    ${article.summary ? `<p class="mt-2 text-text-secondary leading-relaxed text-sm">${article.summary}</p>` : ''}
  </div>`;

  // Article content
  html += `
  <div class="glass rounded-2xl p-8 md:p-10 fade-in article-body" style="animation-delay:0.1s">
    ${marked.parse(content || '')}
  </div>`;

  // Back button
  html += `
  <div class="mt-8 text-center">
    <a href="category.html?pillar=${article.pillar}&cat=${encodeURIComponent(article.subcategory || '')}" class="inline-flex items-center gap-2 px-6 py-3 rounded-xl glass-hover text-sm font-medium transition" style="color:${acc};border-color:rgba(${cfg.accentRgb},0.2);background:rgba(${cfg.accentRgb},0.06);border:1px solid rgba(${cfg.accentRgb},0.2);">
      ← 返回「${article.subcategory || '分类'}」文章列表
    </a>
  </div>`;

  // Cusdis 评论区
  var pageId = article.id || window.location.search;
  html += `
  <div class="mt-12 fade-in" style="animation-delay:0.2s">
    <div class="glass rounded-2xl p-6 md:p-8">
      <h2 class="text-xl font-bold mb-4" style="color:${acc}">💬 评论区</h2>
      <div id="cusdis_thread"
        data-host="https://cusdis.com"
        data-app-id="e75bee9b-7505-440d-9a73-e9ccd1d68f7b"
        data-page-id="${pageId}"
        data-page-url="${window.location.href}"
        data-page-title="${article.title}"
        data-theme="${document.documentElement.classList.contains('scholar') ? 'light' : 'dark'}"
        data-lang="zh-CN"
        data-css="${new URL('cusdis-theme.css', window.location.href).href}"
      ></div>
    </div>
  </div>`;

  document.getElementById('app').innerHTML = html;
}

init();

// === Cusdis 评论系统 ===
// 页面渲染完成后加载 Cusdis 脚本
setTimeout(function() {
  if (!window.CUSDIS_LOADED) {
    var s = document.createElement('script');
    s.src = 'https://cusdis.com/js/cusdis.es.js';
    s.async = true;
    document.body.appendChild(s);
    window.CUSDIS_LOADED = true;
  }
}, 500);

// 主题切换时更新 Cusdis 主题
window.addEventListener('camel-theme-changed', function(e) {
  var theme = e.detail === 'scholar' ? 'light' : 'dark';
  var thread = document.getElementById('cusdis_thread');
  if (thread) {
    thread.setAttribute('data-theme', theme);
  }
  // 通知 Cusdis iframe 更新主题
  var iframe = document.querySelector('#cusdis_thread iframe');
  if (iframe && iframe.contentWindow) {
    iframe.contentWindow.postMessage({ type: 'setTheme', theme: theme }, '*');
  }
});
</script>
  <script src="theme-toggle.js"></script>
</body>
