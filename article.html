<script>
// еҠЁжҖҒеҠ иҪҪж–Үз« жӯЈж–Ү вҖ” жҢүйңҖ fetch еҚ•зҜҮ JSONпјҢдёҚеҶҚеҠ иҪҪе…ЁйҮҸ JS
(function() {
  var id = (new URLSearchParams(window.location.search)).get('id') || '';
  if (!id) {
    window.__ARTICLE_CONTENT__ = {};
    window.__ARTICLE_FETCH__ = Promise.resolve(true);
    return;
  }

  window.__ARTICLE_FETCH__ = fetch('data/articles/' + id + '.json')
    .then(function(r) {
      if (!r.ok) throw new Error('HTTP ' + r.status);
      return r.json();
    })
    .then(function(data) {
      window.__ARTICLE_CONTENT__ = {};
      window.__ARTICLE_CONTENT__[data.id] = data.content;
      return true;
    })
    .catch(function(err) {
      console.warn('ж–Үз« еҶ…е®№еҠ иҪҪеӨұиҙҘ:', err);
      window.__ARTICLE_CONTENT__ = {};
      return true;
    });
})();
</script>

<script>
const PILLAR_CONFIG = {
  worldview: {
    name: 'рҹҢҢ дё–з•Ңи§Ӯ', slug: 'worldview.html', accent: '#22d3ee', accentRgb: '34,211,238'
  },
  social: {
    name: 'рҹҸӣпёҸ з»ҸжөҺйҖ»иҫ‘', slug: 'social.html', accent: '#f59e0b', accentRgb: '245,158,11'
  },
  practice: {
    name: 'рҹ§ҳ жҖқжғідёҺдҝ®иЎҢ', slug: 'practice.html', accent: '#a855f7', accentRgb: '168,85,247'
  }
};

// Configure marked
marked.setOptions({ breaks: true, gfm: true });

// Process article navigation links: convert "вҶҗ дёӢдёҖзҜҮпјҡж Үйўҳ" or "вҶ’ дёӢдёҖзҜҮ вҶ’ ж Үйўҳ" to clickable links
function processNavLinks(content) {
  if (!content) return content;

  // Pattern 1: "вҶҗ дёҠдёҖзҜҮпјҡж Үйўҳ" or "вҶҗ дёҠдёҖзҜҮпјҡж— пјҲжң¬зі»еҲ—йҰ–зҜҮпјү"
  content = content.replace(/вҶҗ дёҠдёҖзҜҮпјҡ([^|\n]+)(?:\|([^|\n]+))?/g, function(match, title, linkText) {
    return 'вҶҗ дёҠдёҖзҜҮпјҡ<span class="nav-link">' + (linkText || title) + '</span>';
  });

  // Pattern 2: "вҶ’ дёӢдёҖзҜҮ вҶ’ ж Үйўҳ" or "вҶ’ дёӢдёҖзҜҮпјҡж Үйўҳ"
  content = content.replace(/(?:вҶ’ дёӢдёҖйЎө|вҶ’ дёӢдёҖзҜҮ)[пјҡвҶ’]\s*([^|\n]+)(?:\|([^|\n]+))?/g, function(match, title, linkText) {
    return 'вҶ’ дёӢдёҖзҜҮпјҡ<span class="nav-link">' + (linkText || title) + '</span>';
  });

  // Pattern 3: "[[ж–Үз« ж Үйўҳ]]" wikilinks
  content = content.replace(/\[\[([^\]|]+)(?:\|([^\]]+))?\]\]/g, function(match, title, linkText) {
    // Skip image files
    if (/\.(jpg|png|gif|webp|jpeg)$/i.test(title)) {
      return match;
    }
    // Skip MOC references
    if (/^MOC/i.test(title)) {
      return '';
    }
    // Convert to link вҖ” look up article by title to get short hash
    var text = linkText || title;
    var arts = (window.__ARTICLES__ && (window.__ARTICLES__.articles || window.__ARTICLES__)) || [];
    var found = arts.find(function(a) { return a.title === title; });
    var shortId = found ? found.short_id : encodeURIComponent(title);
    return '<a href="article.html?id=' + shortId + '" class="nav-link">' + text + '</a>';
  });

  return content;
}

function init() {
  const params = new URLSearchParams(window.location.search);
  const id = params.get('id') || '';

  if (!id) {
    document.getElementById('app').innerHTML = '<div class="glass rounded-2xl p-12 text-center"><p class="text-text-muted text-lg">жңӘжүҫеҲ°ж–Үз«  ID</p></div>';
    return;
  }

  try {
    const data = window.__ARTICLES__;
    const articles = data.articles || data;
    let meta = articles.find(a => a.id === id);
    if (!meta) meta = articles.find(a => a.id.endsWith('-' + id));   // зҹӯе“ҲеёҢ URL
    if (!meta) meta = articles.find(a => a.title === id);             // wikilink ж Үйўҳ
    if (!meta) {
      document.getElementById('app').innerHTML = '<div class="glass rounded-2xl p-12 text-center"><p class="text-text-muted text-lg">ж–Үз« жңӘжүҫеҲ°: ' + id + '</p></div>';
      return;
    }
    // дҪҝз”Ёйў„еҠ иҪҪзҡ„ж•°жҚ®пјҲеҰӮжһңе·Іе®ҢжҲҗпјүпјҢеҗҰеҲҷйҮҚж–° fetch
    function renderContent(d) {
      // ж•°жҚ®еҠ иҪҪејӮеёёдҝқжҠӨ
      if (typeof window.__ARTICLE_CONTENT__ !== 'object') {
        document.getElementById('app').innerHTML = '<div class="glass rounded-2xl p-12 text-center fade-in"><p class="text-lg" style="color:#94a3b8">вҡ пёҸ ж–Үз« еҶ…е®№еҠ иҪҪејӮеёё</p><p class="text-sm mt-2" style="color:#64748b">иҜ·еҲ·ж–°йЎөйқўйҮҚиҜ•пјҢеҰӮжһңжҢҒз»ӯеҮәзҺ°иҜ·иҒ”зі»з«ҷй•ҝ</p></div>';
        return;
      }
      var content = window.__ARTICLE_CONTENT__ && window.__ARTICLE_CONTENT__[meta.id];
      if (!content) {
        content = '> вҡ пёҸ иҝҷзҜҮж–Үз« жӯЈж–Үж•°жҚ®жҡӮдёҚеҸҜз”ЁгҖӮ';
      }
      render(meta, content);
    }
    if (window.__ARTICLE_FETCH__) {
      window.__ARTICLE_FETCH__.then(renderContent).catch(function() { renderContent(null); });
    } else {
      renderContent(null);
    }
  } catch (err) {
    document.getElementById('app').innerHTML = '<div class="glass rounded-2xl p-12 text-center"><p class="text-text-muted text-lg">ж•°жҚ®еҠ иҪҪеӨұиҙҘ: ' + err.message + '</p></div>';
  }
}

function render(article, content) {
  const cfg = PILLAR_CONFIG[article.pillar];
  // йҳІжҠӨпјҡcfg дёә undefined ж—¶з»ҷй»ҳи®ӨеҖјпјҢйҒҝе…ҚйЎөйқўеҮәзҺ° "undefined" еӯ—з¬ҰдёІ
  const acc = cfg ? cfg.accent : '#f59e0b';
  const accRgb = cfg ? cfg.accentRgb : '245,158,11';
  const slug = cfg ? cfg.slug : 'worldview.html';
  const pillarName = cfg ? cfg.name : 'дё–з•Ңи§Ӯ';
  document.title = `${article.title} вҖ” йӘҶй©је•Ҷдёҡжң¬иҙЁ`;

  // в”Җв”Җ Open Graph еҠЁжҖҒж Үзӯҫ в”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җ
  // жё…зҗҶж—§ OG ж ҮзӯҫпјҲйҳІжӯўеӨҡж¬Ў render йҮҚеӨҚж·»еҠ пјү
  document.querySelectorAll('meta[property^="og:"]').forEach(el => el.remove());
  var ogTags = [
    ['og:title', article.title + ' вҖ” йӘҶй©је•Ҷдёҡжң¬иҙЁ'],
    ['og:description', article.summary || article.title],
    ['og:type', 'article'],
    ['og:url', window.location.href],
    ['og:site_name', 'йӘҶй©је•Ҷдёҡжң¬иҙЁ'],
  ];
  ogTags.forEach(function(t) {
    var m = document.createElement('meta');
    m.setAttribute('property', t[0]);
    m.setAttribute('content', t[1]);
    document.head.appendChild(m);
  });

  let html = '';

  // Breadcrumb
  if (cfg) {
    html += `
    <div class="mb-8 fade-in">
      <a href="index.html" class="back-link inline-flex items-center gap-2 text-sm text-text-muted hover:opacity-70 transition" style="color:${acc}">вҶҗ иҝ”еӣһйҰ–йЎө</a>
      <span class="text-text-muted mx-2">/</span>
      <a href="${slug}" class="text-sm hover:underline transition" style="color:${acc}">${pillarName}</a>
    `;
    if (article.subcategory) {
      html += `
      <span class="text-text-muted mx-2">/</span>
      <a href="category.html?pillar=${article.pillar}&cat=${encodeURIComponent(article.subcategory)}" class="text-sm hover:underline transition" style="color:${acc}">${article.subcategory}</a>
      `;
    }
    html += `</div>`;
  }

  // Header card
  html += `
  <div class="glass rounded-2xl p-8 mb-8 fade-in" style="border-left: 3px solid ${acc}">
    <div class="flex items-center gap-3 mb-4">
      <span class="px-3 py-1 rounded-full text-xs font-medium border" style="border-color:rgba(${accRgb},0.3);color:${acc};background:rgba(${accRgb},0.08);">${article.category || ''}</span>
      <span class="text-xs text-text-muted">${article.date || ''}</span>
      ${article.importance >= 5 ? '<span class="text-xs px-2 py-0.5 rounded-full" style="background:rgba(34,211,238,0.12);color:#22d3ee">зІҫйҖү</span>' : ''}
    </div>
    <h1 class="text-2xl font-extrabold leading-snug article-title">${article.title}</h1>
    ${article.summary ? `<p class="mt-3 text-text-secondary leading-relaxed text-base">${article.summary}</p>` : ''}
  </div>`;

  // Article content - process nav links first
  var processedContent = processNavLinks(content);
  html += `
  <div class="glass rounded-2xl p-8 md:p-10 fade-in article-body" style="animation-delay:0.1s">
    ${marked.parse(processedContent || '')}
  </div>`;

  // Back button
  html += `
  <div class="mt-8 text-center">
    <a href="category.html?pillar=${article.pillar}&cat=${encodeURIComponent(article.subcategory || '')}" class="inline-flex items-center gap-2 px-6 py-3 rounded-xl glass-hover text-sm font-medium transition" style="color:${acc};border-color:rgba(${accRgb},0.2);background:rgba(${accRgb},0.06);border:1px solid rgba(${accRgb},0.2);">
      вҶҗ иҝ”еӣһгҖҢ${article.subcategory || 'еҲҶзұ»'}гҖҚж–Үз« еҲ—иЎЁ
    </a>
  </div>`;

  // Cusdis иҜ„и®әеҢә
  var pageId = article.id || window.location.search;
  html += `
  <div class="mt-12 fade-in" style="animation-delay:0.2s">
    <div class="glass rounded-2xl p-6 md:p-8">
      <h2 class="text-xl font-bold mb-4" style="color:${acc}">рҹ’¬ иҜ„и®әеҢә</h2>
      <div id="cusdis_thread"
        data-host="https://cusdis.com"
        data-app-id="e75bee9b-7505-440d-9a73-e9ccd1d68f7b"
        data-page-id="${pageId}"
        data-page-url="${window.location.href}"
        data-page-title="${article.title}"
        data-theme="${document.documentElement.classList.contains('scholar') ? 'light' : 'dark'}"
        data-lang="zh-CN"
        data-css="${new URL('cusdis-theme.css', window.location.href).href}"
      ></div>
    </div>
  </div>`;

  document.getElementById('app').innerHTML = html;
}

init();
// еҠ иҪҪи¶…ж—¶пјҡ8 з§’еҗҺеҰӮжһңйЎөйқўд»ҚжҳҜ"еҠ иҪҪдёӯ..."пјҢжҳҫзӨәеҸҜж“ҚдҪңжҸҗзӨә
setTimeout(function() {
  var app = document.getElementById('app');
  if (app && app.innerHTML.indexOf('еҠ иҪҪдёӯ') !== -1) {
    app.innerHTML =
      '<div class="glass rounded-2xl p-12 text-center fade-in" style="max-width:480px;margin:3rem auto">' +
      '<p class="text-lg" style="color:#f59e0b">вҸі йЎөйқўеҠ иҪҪи¶…ж—¶</p>' +
      '<p class="text-sm mt-2 text-text-muted">ж•°жҚ®ж–Үд»¶еҸҜиғҪиҫғеӨ§жҲ–зҪ‘з»ңиҫғж…ўпјҢ<br>иҜ·е°қиҜ• <a href="javascript:location.reload()" class="underline" style="color:#22d3ee">еҲ·ж–°йЎөйқў</a></p>' +
      '</div>';
  }
}, 20000);

// === Cusdis иҜ„и®әзі»з»ҹ ===
// йЎөйқўжёІжҹ“е®ҢжҲҗеҗҺеҠ иҪҪ Cusdis и„ҡжң¬
setTimeout(function() {
  if (!window.CUSDIS_LOADED) {
    var s = document.createElement('script');
    s.src = 'https://cusdis.com/js/cusdis.es.js';
    s.async = true;
    document.body.appendChild(s);
    window.CUSDIS_LOADED = true;
  }
}, 500);

// дё»йўҳеҲҮжҚўж—¶жӣҙж–° Cusdis дё»йўҳ
window.addEventListener('camel-theme-changed', function(e) {
  var theme = e.detail === 'scholar' ? 'light' : 'dark';
  var thread = document.getElementById('cusdis_thread');
  if (thread) {
    thread.setAttribute('data-theme', theme);
  }
  // йҖҡзҹҘ Cusdis iframe жӣҙж–°дё»йўҳ
  var iframe = document.querySelector('#cusdis_thread iframe');
  if (iframe && iframe.contentWindow) {
    iframe.contentWindow.postMessage({ type: 'setTheme', theme: theme }, '*');
  }
});
</script>
  <script src="components.js"></script>
  <script src="theme-toggle.js"></script>
</body>
