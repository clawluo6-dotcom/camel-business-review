<script src="https://cdn.tailwindcss.com"></script>
<script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
<script>
  tailwind.config = {
    darkMode: 'class',
    theme: {
      extend: {
        colors: {
          bg: { primary:'#0a0e17', secondary:'#111827', card:'#1a1f2e', hover:'#242b3d' },
          accent: {
            cyan:'#22d3ee', purple:'#a855f7', emerald:'#34d399',
            amber:'#fbbf24', rose:'#fb7185', orange:'#fb923c', gold:'#f59e0b'
          },
          text: { primary:'#e2e8f0', secondary:'#94a3b8', muted:'#64748b' }
        }

<style>
  @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&family=JetBrains+Mono:wght@400;500;600;700&display=swap');
  * { box-sizing: border-box; }
  body { background: #0a0e17; color: #e2e8f0; font-family: 'Inter', system-ui, sans-serif; }
  .glass { background: rgba(26,31,46,0.7); backdrop-filter: blur(16px); -webkit-backdrop-filter: blur(16px); border: 1px solid rgba(255,255,255,0.06); }
  .gradient-text { background: linear-gradient(135deg, #22d3ee, #a855f7); -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text; }
  .bg-grid { background-image: radial-gradient(circle at 1px 1px, rgba(255,255,255,0.03) 1px, transparent 0); background-size: 40px 40px; }
  .bg-glow-top { background: radial-gradient(ellipse 80% 60% at 50% 0%, rgba(34,211,238,0.06) 0%, transparent 70%); }
  .nav-link { position: relative; }
  .nav-link::after { content:''; position:absolute; bottom:-4px; left:0; width:0; height:2px; background: linear-gradient(90deg, #22d3ee, #a855f7); transition: width 0.3s ease; }
  .nav-link:hover::after { width: 100%; }
  .fade-in { animation: fadeIn 0.6s ease-out; }
  @keyframes fadeIn { from { opacity:0; transform:translateY(12px); } to { opacity:1; transform:translateY(0); } }
  .back-link { transition: all 0.3s ease; }
  .back-link:hover { transform: translateX(-4px); }
  /* Article typography */
  .article-body { max-width: 780px; }
  .article-body h1 { font-size: 2rem; font-weight: 800; margin-bottom: 1.5rem; margin-top: 2rem; line-height: 1.3; }
  .article-body h2 { font-size: 1.5rem; font-weight: 700; margin-bottom: 1rem; margin-top: 2.5rem; line-height: 1.4; }
  .article-body h3 { font-size: 1.2rem; font-weight: 600; margin-bottom: 0.75rem; margin-top: 2rem; line-height: 1.4; }
  .article-body p { font-size: 1.05rem; line-height: 1.85; margin-bottom: 1.25rem; color: #cbd5e1; }
  .article-body blockquote { border-left: 3px solid rgba(255,255,255,0.15); padding: 0.75rem 1.25rem; margin: 1.5rem 0; background: rgba(255,255,255,0.03); border-radius: 0 8px 8px 0; font-style: italic; color: #94a3b8; }
  .article-body blockquote p { color: #94a3b8; font-size: 1rem; margin-bottom: 0.5rem; }
  .article-body ul, .article-body ol { margin: 1rem 0 1.5rem 1.5rem; }
  .article-body li { font-size: 1.05rem; line-height: 1.85; margin-bottom: 0.35rem; color: #cbd5e1; }
  .article-body strong { color: #e2e8f0; }
  .article-body hr { border: none; height: 1px; margin: 2.5rem 0; background: linear-gradient(90deg, transparent, rgba(255,255,255,0.1), transparent); }
  .article-body code { background: rgba(255,255,255,0.06); padding: 2px 6px; border-radius: 4px; font-family: 'JetBrains Mono', monospace; font-size: 0.9em; }
  .article-body table { width: 100%; border-collapse: collapse; margin: 1.5rem 0; font-size: 0.95rem; }
  .article-body th { background: rgba(255,255,255,0.06); padding: 0.6rem 1rem; text-align: left; font-weight: 600; border-bottom: 2px solid rgba(255,255,255,0.1); }
  .article-body td { padding: 0.5rem 1rem; border-bottom: 1px solid rgba(255,255,255,0.05); color: #cbd5e1; }
</style>
<script src="articles.js"></script>
</head>
<body class="bg-bg-primary bg-grid min-h-screen bg-glow-top">

<!-- NAV -->
<nav class="sticky top-0 z-50 glass border-b border-white/5">
  <div class="max-w-7xl mx-auto px-6 py-3 flex items-center justify-between">
    <a href="index.html" class="flex items-center gap-3 no-underline">
      <div class="w-8 h-8 rounded-lg bg-gradient-to-br from-accent-cyan to-accent-purple flex items-center justify-center">
        <span class="text-white font-bold text-sm">✦</span>
      </div>
      <div>
        <h1 class="text-lg font-bold tracking-tight"><span class="gradient-text">骆驼🐫</span> <span class="text-text-secondary font-normal">商业本质</span></h1>
      </div>
    </a>
    <div class="flex items-center gap-5">
      <a href="index.html" class="nav-link text-sm font-medium text-text-secondary hover:text-accent-cyan transition">首页</a>
      <a href="worldview.html" class="nav-link text-sm font-medium text-text-secondary hover:text-accent-cyan transition">世界观</a>
      <a href="social.html" class="nav-link text-sm font-medium text-text-secondary hover:text-accent-gold transition">社会逻辑</a>
      <a href="practice.html" class="nav-link text-sm font-medium text-text-secondary hover:text-accent-purple transition">思想与修行</a>
      <a href="ai-news.html" class="nav-link text-sm font-medium text-text-secondary hover:text-accent-emerald transition">AI 速报</a>
      <a href="about.html" class="nav-link text-sm font-medium text-text-secondary hover:text-accent-amber transition">关于</a>
      <a href="admin.html" class="ml-2 px-3 py-1.5 rounded-lg border border-white/10 text-text-muted hover:text-accent-cyan hover:border-accent-cyan/30 transition text-xs font-mono">ADMIN</a>
    </div>
  </div>
</nav>

<!-- Article Body -->
<div class="max-w-4xl mx-auto px-6 pt-12 pb-20">
  <div id="app">
    <div class="text-center text-text-muted py-20">加载中...</div>
  </div>
</div>

<!-- FOOTER -->
<footer class="border-t border-white/5 mt-8 bg-bg-secondary/50">
  <div class="max-w-7xl mx-auto px-6 py-8 flex flex-col md:flex-row items-center justify-between gap-4">
    <div class="flex items-center gap-2 text-sm text-text-muted">
      <span class="gradient-text font-bold">骆驼🐫 商业本质</span>
      <span>·</span>
      <span>认识世界 · 理解社会 · 安顿自己</span>
    </div>
    <div class="flex items-center gap-4 text-xs text-text-muted">
      <a href="index.html" class="hover:text-accent-cyan transition">首页</a>
      <span>·</span>
      <a href="worldview.html" class="hover:text-accent-cyan transition">世界观</a>
      <span>·</span>
      <a href="social.html" class="hover:text-accent-gold transition">社会逻辑</a>
      <span>·</span>
      <a href="practice.html" class="hover:text-accent-purple transition">思想与修行</a>
    </div>
  </div>
</footer>

<script>
const PILLAR_CONFIG = {
  worldview: {
    name: '🌌 世界观', slug: 'worldview.html', accent: '#22d3ee', accentRgb: '34,211,238'
  },
  social: {
    name: '🏛️ 社会逻辑', slug: 'social.html', accent: '#f59e0b', accentRgb: '245,158,11'
  },
  practice: {
    name: '🧘 思想与修行', slug: 'practice.html', accent: '#a855f7', accentRgb: '168,85,247'
  }
};

// Configure marked
marked.setOptions({ breaks: true, gfm: true });

function init() {
  const params = new URLSearchParams(window.location.search);
  const id = params.get('id') || '';

  if (!id) {
    document.getElementById('app').innerHTML = '<div class="glass rounded-2xl p-12 text-center"><p class="text-text-muted text-lg">未找到文章 ID</p></div>';
    return;
  }

  try {
    const data = window.__ARTICLES__;
    const articles = data.articles || data;
    const article = articles.find(a => a.id === id);
    if (!article) {
      document.getElementById('app').innerHTML = `<div class="glass rounded-2xl p-12 text-center"><p class="text-text-muted text-lg">文章未找到: ${id}</p></div>`;
      return;
    }
    render(article);
  } catch (err) {
    document.getElementById('app').innerHTML = `<div class="glass rounded-2xl p-12 text-center"><p class="text-text-muted text-lg">数据加载失败: ${err.message}</p></div>`;
  }
}

function render(article) {
  const cfg = PILLAR_CONFIG[article.pillar];
  const acc = cfg ? cfg.accent : '#f59e0b';
  document.title = `${article.title} — 骆驼商业本质`;

  let html = '';

  // Breadcrumb
  if (cfg) {
    html += `
    <div class="mb-8 fade-in">
      <a href="index.html" class="back-link inline-flex items-center gap-2 text-sm text-text-muted hover:opacity-70 transition" style="color:${acc}">← 返回首页</a>
      <span class="text-text-muted mx-2">/</span>
      <a href="${cfg.slug}" class="text-sm hover:underline transition" style="color:${acc}">${cfg.name}</a>
    `;
    if (article.subcategory) {
      html += `
      <span class="text-text-muted mx-2">/</span>
      <a href="category.html?pillar=${article.pillar}&cat=${encodeURIComponent(article.subcategory)}" class="text-sm hover:underline transition" style="color:${acc}">${article.subcategory}</a>
      `;
    }
    html += `</div>`;
  }

  // Header card
  html += `
  <div class="glass rounded-2xl p-8 mb-8 fade-in" style="border-left: 3px solid ${acc}">
    <div class="flex items-center gap-3 mb-4">
      <span class="px-3 py-1 rounded-full text-xs font-medium border" style="border-color:rgba(${cfg.accentRgb},0.3);color:${acc};background:rgba(${cfg.accentRgb},0.08);">${article.category || ''}</span>
      <span class="text-xs text-text-muted">${article.date || ''}</span>
      ${article.importance >= 5 ? '<span class="text-xs px-2 py-0.5 rounded-full" style="background:rgba(34,211,238,0.12);color:#22d3ee">精选</span>' : ''}
    </div>
    <h1 class="text-3xl font-extrabold leading-tight" style="color:${acc}">${article.title}</h1>
    ${article.summary ? `<p class="mt-4 text-text-secondary leading-relaxed text-lg">${article.summary}</p>` : ''}
  </div>`;

  // Article content
  html += `
  <div class="glass rounded-2xl p-8 md:p-10 fade-in article-body" style="animation-delay:0.1s">
    ${marked.parse(article.content || '')}
  </div>`;

  // Back button
  html += `
  <div class="mt-8 text-center">
    <a href="category.html?pillar=${article.pillar}&cat=${encodeURIComponent(article.subcategory || '')}" class="inline-flex items-center gap-2 px-6 py-3 rounded-xl glass-hover text-sm font-medium transition" style="color:${acc};border-color:rgba(${cfg.accentRgb},0.2);background:rgba(${cfg.accentRgb},0.06);border:1px solid rgba(${cfg.accentRgb},0.2);">
      ← 返回「${article.subcategory || '分类'}」文章列表
    </a>
  </div>`;

  document.getElementById('app').innerHTML = html;
}

init();
</script>
</body>
</html>
