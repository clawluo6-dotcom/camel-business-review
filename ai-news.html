<script>
// 主题切换同步（同样同步到 object 内部）
function syncTheme(theme) {
  document.documentElement.className = theme || 'scholar';
  var obj = document.getElementById('dashObject');
  if (obj && obj.contentWindow) {
    try {
      obj.contentWindow.postMessage({ type: 'theme-change', theme: theme || 'scholar' }, '*');
    } catch(e) {}
  }
}

window.addEventListener('camel-theme-changed', function(e) {
  syncTheme(e.detail);
});
</script>
