let DATA = null;

async function loadData() {
  const localData = localStorage.getItem('afd_news_data');
  if (localData) {
    try { DATA = JSON.parse(localData); return; }
    catch(e) { console.warn('localStorage parse failed'); }
  }
  DATA = BUILTIN_DATA;
}

function renderFeatured() {
  const f = DATA.featured;
  document.getElementById('featuredDate').textContent = f.date;
  document.getElementById('featuredTitle').textContent = f.title;
  document.getElementById('featuredSummary').textContent = f.summary;
}

function renderStats() {
  const s = DATA.stats;
  document.getElementById('statValuation').textContent = '$' + s.anthropicValuation + 'B';
  document.getElementById('statHallucination').textContent = '↓' + s.gpt55HallucinationReduction + '%';

}

const categoryConfig = {
  models:    { name:'大模型军备', icon:'🧠', color:'cyan',    gradFrom:'#22d3ee', gradTo:'#0891b2' },
  agents:    { name:'智能体浪潮', icon:'🤖', color:'purple',  gradFrom:'#a855f7', gradTo:'#7c3aed' },
  hardware:  { name:'硬件与基建', icon:'💻', color:'emerald', gradFrom:'#34d399', gradTo:'#059669' },
  opensource:{ name:'开源与语音', icon:'📡', color:'amber',   gradFrom:'#fbbf24', gradTo:'#d97706' },
  china:     { name:'中国动态',   icon:'🇨🇳', color:'rose',     gradFrom:'#fb7185', gradTo:'#e11d48' },
  policy:    { name:'政策与监管', icon:'🛡️', color:'orange',   gradFrom:'#fb923c', gradTo:'#ea580c' }
};

function renderCategorySections() {
  const container = document.getElementById('categorySections');
  const grouped = {};
  DATA.categories.forEach(c => { grouped[c.id] = []; });
  (DATA.news || []).forEach(n => { if (grouped[n.category]) grouped[n.category].push(n); });

  let html = '';
  for (const [catId, news] of Object.entries(grouped)) {
    if (!news.length) continue;
    const cfg = categoryConfig[catId] || { name:catId, icon:'📌', color:'slate', gradFrom:'#94a3b8', gradTo:'#64748b' };
    html += `<section id="${catId}">
      <div class="flex items-center gap-3 mb-5">
        <div class="w-10 h-10 rounded-xl flex items-center justify-center text-lg" style="background:linear-gradient(135deg, ${cfg.gradFrom}20, ${cfg.gradTo}20); border:1px solid ${cfg.gradFrom}30">${cfg.icon}</div>
        <div><h3 class="text-lg font-bold">${cfg.name}</h3><p class="text-xs text-text-muted">${news.length} 条速报</p></div>
      </div>
      <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-4">`;
    news.forEach((n, i) => {
      const impClass = 'importance-' + n.importance;
      const tagsHtml = (n.tags||[]).map(t => `<span class="text-[10px] px-2 py-0.5 rounded-full bg-white/5 text-text-muted">#${t}</span>`).join('');
      html += `<div class="glass rounded-xl p-5 glass-hover fade-in ${impClass}" style="animation-delay:${i*0.05}s">
        <div class="flex items-center justify-between mb-2"><span class="text-[10px] text-text-muted font-mono">${n.date}</span><span class="text-[10px] text-text-muted">${n.source||''}</span></div>
        <h4 class="font-semibold text-sm mb-2 leading-snug">${n.title}</h4>
        <p class="text-xs text-text-secondary leading-relaxed mb-3">${n.summary}</p>
        <div class="flex flex-wrap gap-1">${tagsHtml}</div>
      </div>`;
    });
    html += '</div></section>';
  }
  container.innerHTML = html;
}

function renderTimeline() {
  const container = document.getElementById('timelineContent');
  if (!container) return;
  const colors = ['#22d3ee','#a855f7','#34d399','#fbbf24'];
  let html = '';
  if (DATA.timeline && DATA.timeline.length > 0) {
    const dates = DATA.timeline.map(d => d.date);
    document.getElementById('timelineRange').textContent = dates[0] + ' — ' + dates[dates.length-1];
  }
  (DATA.timeline || []).forEach((day, i) => {
    html += `<div class="relative pb-8 last:pb-0 fade-in" style="animation-delay:${i*0.15}s">
      <div class="timeline-dot absolute -left-[7px] top-1" style="border-color:${colors[i%4]}"></div>
      <div class="ml-4"><div class="text-sm font-bold font-mono" style="color:${colors[i%4]}">${day.date}</div>
      <div class="mt-2 space-y-1.5">`;
    (day.events||[]).forEach(e => { html += `<div class="text-sm text-text-secondary flex items-start gap-2"><span class="text-text-muted mt-1">▸</span>${e}</div>`; });
    html += '</div></div></div>';
  });
  container.innerHTML = html;
}

init();

// === Tab 切换逻辑 ===
function switchTab(tab) {
  const tabAI = document.getElementById('tabAI');
  const tabEcon = document.getElementById('tabEcon');
  const contentAI = document.getElementById('contentAI');
  const contentEcon = document.getElementById('contentEcon');
  const iframe = document.getElementById('econIframe');

  // 重置所有 Tab 状态
  tabAI.className = 'tab-btn';
  tabEcon.className = 'tab-btn';
  contentAI.className = 'tab-content';
  contentEcon.className = 'tab-content';

  if (tab === 'ai') {
    tabAI.className = 'tab-btn active-ai';
    contentAI.className = 'tab-content active';
  } else {
    tabEcon.className = 'tab-btn active-econ';
    contentEcon.className = 'tab-content active';
    // 懒加载 iframe（首次点击时才加载仪表盘）
    if (iframe && !iframe.src && iframe.dataset.src) {
      iframe.src = iframe.dataset.src;
    }
  }
  // 滚动到内容顶部
  window.scrollTo({ top: 0, behavior: 'smooth' });
}

// 如果 URL 带 ?tab=econ 参数，自动切换到经济数据 Tab
if (window.location.search.includes('tab=econ')) {
  switchTab('econ');
}

// 主题切换时，通知已加载的 iframe
window.addEventListener('camel-theme-changed', (e) => {
  const iframe = document.getElementById('econIframe');
  if (iframe && iframe.contentWindow) {
    try {
      iframe.contentWindow.postMessage(
        { type: 'theme-change', theme: e.detail },
        '*'
      );
    } catch(err) { /* ignore cross-origin errors */ }
  }
});
