let DATA = null;

async function loadData() {
  // Priority 1: localStorage (admin edits)
  const localData = localStorage.getItem('afd_news_data');
  if (localData) {
    try { DATA = JSON.parse(localData); return; }
    catch(e) { console.warn('localStorage parse failed, using builtin data'); }
  }
  // Priority 2: inline builtin data (works with file:// protocol)
  DATA = BUILTIN_DATA;
}

// ===== Render Functions =====
function renderFeatured() {
  const f = DATA.featured;
  document.getElementById('featuredDate').textContent = f.date;
  document.getElementById('featuredTitle').textContent = f.title;
  document.getElementById('featuredSummary').textContent = f.summary;
}

function renderStats() {
  const s = DATA.stats;
  document.getElementById('statValuation').textContent = '$' + s.anthropicValuation + 'B';
  document.getElementById('statHallucination').textContent = '↓' + s.gpt55HallucinationReduction + '%';
  document.getElementById('statPrice').textContent = '$' + s.geminiPricePerMillion.toFixed(2);
  document.getElementById('statChina').textContent = s.chinaAIScale;
}

const categoryConfig = {
  models:    { name:'大模型军备', icon:'🧠', color:'cyan',    gradFrom:'#22d3ee', gradTo:'#0891b2' },
  agents:    { name:'智能体浪潮', icon:'🤖', color:'purple',  gradFrom:'#a855f7', gradTo:'#7c3aed' },
  hardware:  { name:'硬件与基建', icon:'💻', color:'emerald', gradFrom:'#34d399', gradTo:'#059669' },
  opensource:{ name:'开源与语音', icon:'📡', color:'amber',   gradFrom:'#fbbf24', gradTo:'#d97706' },
  china:     { name:'中国动态',   icon:'🇨🇳', color:'rose',     gradFrom:'#fb7185', gradTo:'#e11d48' },
  policy:    { name:'政策与监管', icon:'🛡️', color:'orange',   gradFrom:'#fb923c', gradTo:'#ea580c' }
};

function renderCategorySections() {
  const container = document.getElementById('categorySections');
  // Group news by category
  const grouped = {};
  DATA.categories.forEach(c => { grouped[c.id] = []; });
  DATA.news.forEach(n => { if (grouped[n.category]) grouped[n.category].push(n); });

  let html = '';
  for (const [catId, news] of Object.entries(grouped)) {
    if (!news.length) continue;
    const cfg = categoryConfig[catId] || { name:catId, icon:'📌', color:'slate', gradFrom:'#94a3b8', gradTo:'#64748b' };
    html += `
    <section id="${catId}">
      <div class="flex items-center gap-3 mb-5">
        <div class="w-10 h-10 rounded-xl flex items-center justify-center text-lg" style="background:linear-gradient(135deg, ${cfg.gradFrom}20, ${cfg.gradTo}20); border:1px solid ${cfg.gradFrom}30">
          ${cfg.icon}
        </div>
        <div>
          <h2 class="text-lg font-bold">${cfg.name}</h2>
          <p class="text-xs text-text-muted">${news.length} 条速报</p>
        </div>
      </div>
      <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-4">
    `;
    news.forEach(n => {
      const impClass = 'importance-' + n.importance;
      const tagsHtml = n.tags.map(t => `<span class="text-[10px] px-2 py-0.5 rounded-full bg-white/5 text-text-muted">#${t}</span>`).join('');
      html += `
        <div class="glass rounded-xl p-5 card-transition glass-hover fade-in ${impClass}">
          <div class="flex items-center justify-between mb-2">
            <span class="text-[10px] text-text-muted font-mono">${n.date}</span>
            <span class="text-[10px] text-text-muted">${n.source || ''}</span>
          </div>
          <h3 class="font-semibold text-sm mb-2 leading-snug">${n.title}</h3>
          <p class="text-xs text-text-secondary leading-relaxed mb-3">${n.summary}</p>
          <div class="flex flex-wrap gap-1">${tagsHtml}</div>
        </div>`;
    });
    html += '</div></section>';
  }
  container.innerHTML = html;
}

function renderTimeline() {
  const container = document.getElementById('timelineContent');
  const colors = ['#22d3ee','#a855f7','#34d399','#fbbf24'];
  let html = '';
  DATA.timeline.forEach((day, i) => {
    html += `
    <div class="relative pb-8 last:pb-0 fade-in" style="animation-delay:${i*0.15}s">
      <div class="timeline-dot absolute -left-[7px] top-1" style="border-color:${colors[i%4]}"></div>
      <div class="ml-4">
        <div class="text-sm font-bold font-mono" style="color:${colors[i%4]}">${day.date}</div>
        <div class="mt-2 space-y-1.5">
    `;
    day.events.forEach(e => {
      html += `<div class="text-sm text-text-secondary flex items-start gap-2"><span class="text-text-muted mt-1">▸</span>${e}</div>`;
    });
    html += '</div></div></div>';
  });
  container.innerHTML = html;
}

function renderCharts() {
  // Hallucination rate comparison chart
  new Chart(document.getElementById('chartHallucination'), {
    type: 'bar',
    data: {
      labels: ['GPT-4', 'GPT-5', 'GPT-5.5\nInstant', 'Claude 3', 'Claude 4', 'Claude\nOpus 4.8'],
      datasets: [{
        label: '幻觉率 (%)',
        data: [14.3, 8.2, 3.9, 12.1, 6.5, 2.8],
        backgroundColor: ['#475569','#475569','#22d3ee','#475569','#475569','#a855f7'],
        borderRadius: 6,
        borderSkipped: false
      }]
    },
    options: {
      responsive:true,
      plugins: {
        legend:{display:false},
        title:{display:true,text:'大模型幻觉率对比 (%)',color:'#e2e8f0',font:{size:14,family:'Inter'},padding:16}
      },
      scales: {
        y:{grid:{color:'rgba(255,255,255,0.05)'},ticks:{color:'#94a3b8'}},
        x:{ticks:{color:'#94a3b8',font:{size:10}}}
      }
    }
  });

  // Cost comparison chart
  new Chart(document.getElementById('chartCost'), {
    type: 'bar',
    data: {
      labels: ['GPT-4', 'GPT-5.5\nInstant', 'Gemini 2.0', 'Gemini 3.5\nFlash', 'Claude\nSonnet', 'Claude\nOpus 4.8'],
      datasets: [{
        label: '$/百万 token',
        data: [30, 0.40, 10, 0.10, 3, 15],
        backgroundColor: ['#475569','#22d3ee','#475569','#34d399','#475569','#a855f7'],
        borderRadius: 6,
        borderSkipped: false
      }]
    },
    options: {
      responsive:true,
      plugins: {
        legend:{display:false},
        title:{display:true,text:'百万 Token 成本对比 ($)',color:'#e2e8f0',font:{size:14,family:'Inter'},padding:16}
      },
      scales: {
        y:{type:'logarithmic',grid:{color:'rgba(255,255,255,0.05)'},ticks:{color:'#94a3b8',callback:v=>'$'+v}},
        x:{ticks:{color:'#94a3b8',font:{size:10}}}
      }
    }
  });
}

function renderFooter() {
  document.getElementById('footerUpdated').textContent = '更新于 ' + DATA.meta.lastUpdated.split('T')[0];
}

// ===== Init =====
async function init() {
  await loadData();
  renderFeatured();
  renderStats();
  renderCategorySections();
  renderTimeline();
  renderCharts();
  renderFooter();
}

// Active nav link on scroll
window.addEventListener('scroll', () => {
  const sections = document.querySelectorAll('section[id]');
  const navLinks = document.querySelectorAll('.nav-link');
  let current = '';
  sections.forEach(s => { if (window.scrollY >= s.offsetTop - 100) current = s.id; });
  navLinks.forEach(l => { l.classList.toggle('active', l.getAttribute('href') === '#' + current); });
});

init();
</script>
