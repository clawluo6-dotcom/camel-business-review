<script>
// ── Category Page Logic ──
const PILLAR_CONFIG = {
  worldview: {
    name: '🌌 世界观 · 哲学思想研究', slug: 'worldview.html', accent: '#22d3ee',
    subAccent: '#06b6d4', accentRgb: '34,211,238',
    pillarName: '一、传统哲学研究'
  },
  social: {
    name: '🏛️ 经济逻辑 · 经济研究', slug: 'social.html', accent: '#f59e0b',
    subAccent: '#d97706', accentRgb: '245,158,11',
    pillarName: '二、经济研究'
  },
  practice: {
    name: '🧘 思想与修行', slug: 'practice.html', accent: '#a855f7',
    subAccent: '#7c3aed', accentRgb: '168,85,247',
    pillarName: '三、思想与修行'
  }
};

function init() {
  const params = new URLSearchParams(window.location.search);
  const pillar = (params.get('pillar') || '').trim();
  const sub_raw = (params.get('sub') || '').trim();  // 兼容 sub 参数

  // 安全解析 cat 参数，防止 decodeURIComponent 出错
  let cat = '';
  const catParam = params.get('cat');
  if (catParam) {
    try {
      cat = decodeURIComponent(catParam).trim();
    } catch (e) {
      cat = catParam.trim(); // 解码失败时使用原始值
    }
  }

  if (!pillar || !cat || !PILLAR_CONFIG[pillar]) {
    const msg = !PILLAR_CONFIG[pillar]
      ? `未知 pillar 值：${JSON.stringify(pillar)}，有效值仅为：worldview / social`
      : '未找到分类参数';
    document.getElementById('app').innerHTML = `<div class="empty-state"><p class="text-text-muted text-lg">${msg}</p></div>`;
    return;
  }

  const cfg = PILLAR_CONFIG[pillar];
  // 动态设置页面标题与 SEO meta
  const pageTitle = `${cat} — ${cfg.name.replace(/[^\u4e00-\u9fa5]/g,'')} — 骆驼商业本质`;
  document.title = pageTitle;
  document.querySelector('meta[name="description"]')?.setAttribute('content', `${cfg.name} - ${cat} 分类文章`);
  document.querySelector('meta[property="og:title"]')?.setAttribute('content', pageTitle);
  document.querySelector('meta[property="og:description"]')?.setAttribute('content', `${cfg.name} - ${cat}`);

  try {
    const data = window.__ARTICLES__;
    const articles = data.articles || data;
    // 用 English pillar key 匹配文章的 pillar 字段（不是用中文 pillarName）
    const filtered = articles.filter(a => {
      if (a.pillar !== pillar) return false;
      if (a.id.startsWith('moc-') || (a.title && a.title.startsWith('MOC-'))) return false;
      // 精确匹配 subcategory
      if (a.subcategory === cat) return true;
      // 兼容：cat 参数如果包含额外前缀（如"（一）"），也尝试用 subcategory 反匹配
      if (cat.indexOf(a.subcategory) !== -1) return true;
      if (a.subcategory.indexOf(cat) !== -1) return true;
      return false;
    });
    render(cfg, pillar, cat, filtered);
  } catch (err) {
    document.getElementById('app').innerHTML = `<div class="empty-state"><p class="text-text-muted text-lg">数据加载失败: ${err.message}</p></div>`;
  }
}

function render(cfg, pillar, cat, articles) {
  // 防护：cfg 为 undefined 时给默认值，避免页面出现 "undefined" 字符串
  if (!cfg) {
    document.getElementById('app').innerHTML =
      '<div class="glass rounded-2xl p-12 text-center">' +
      '<p class="text-text-muted text-lg">配置加载失败，请检查 URL 参数 pillar 值是否为 worldview / social / practice</p>' +
      '</div>';
    return;
  }
  const acc = cfg.accent;
  const accDim = cfg.accentRgb;
  let html = '';

  // Breadcrumb
  html += `
  <div class="mb-8">
    <a href="index.html" class="back-link inline-flex items-center gap-2 text-sm text-text-muted hover:opacity-70 transition" style="color:${acc}">
      <span>←</span> <span>返回首页</span>
    </a>
    <span class="text-text-muted mx-2">/</span>
    <a href="${cfg.slug}" class="text-sm hover:underline transition" style="color:${acc}">${cfg.name}</a>
    <span class="text-text-muted mx-2">/</span>
    <span class="text-sm font-semibold" style="color:${acc}">${cat}</span>
  </div>`;

  // Header
  html += `
  <div class="mb-10 fade-in">
    <h2 class="text-3xl font-extrabold mb-2" style="color:${acc}">${cat}</h2>
    <p class="text-text-secondary">共 ${articles.length} 篇文章</p>
  </div>`;

  if (articles.length === 0) {
    html += '<div class="glass rounded-2xl p-12 empty-state"><p class="text-text-muted text-lg">该分类暂无文章，敬请期待</p></div>';
  } else {
    html += '<div class="grid grid-cols-1 md:grid-cols-2 gap-5">';
    articles.forEach((a, i) => {
      const impClass = a.importance >= 5 ? 'importance-5' : a.importance >= 4 ? 'importance-4' : 'importance-3';
      const delay = 0.05 * (i + 1);
      html += `
      <a href="article.html?id=${a.short_id}" class="glass rounded-xl p-6 glass-hover fade-in ${impClass} block no-underline" style="animation-delay:${delay}s">
        <div class="flex items-center justify-between mb-3">
          <span class="text-[10px] text-text-muted font-mono">${a.date || ''}</span>
          ${a.importance >= 5 ? '<span class="text-[10px] px-2 py-0.5 rounded-full badge-essence">精选</span>' : ''}
        </div>
        <h3 class="font-semibold text-base mb-2 leading-snug" style="color:${acc}">${a.title}</h3>
        <p class="text-sm text-text-secondary leading-relaxed">${a.summary || ''}</p>
      </a>`;
    });
    html += '</div>';
  }

  document.getElementById('app').innerHTML = html;
  // 渲染侧边栏导航树
  buildSidebar(pillar, cat);
}

function buildSidebar(pillar, activeCat) {
  var sidebar = document.getElementById('sidebar-tree');
  if (!sidebar || !window.__ARTICLES__) return;
  var modules = window.__ARTICLES__.pillarModules && window.__ARTICLES__.pillarModules[pillar];
  if (!modules) return;

  var allArticles = window.__ARTICLES__.articles || window.__ARTICLES__;
  var html = '';
  modules.forEach(function(mod) {
    var count = 0;
    var subdirHtml = '';
    (mod.subcategories || []).forEach(function(sub) {
      var n = allArticles.filter(function(a) { return a.subcategory === sub && a.pillar === pillar && !a.id.startsWith('moc-'); }).length;
      count += n;
      var activeClass = (sub === activeCat) ? ' active' : '';
      subdirHtml += '<a href="category.html?pillar=' + pillar + '&cat=' + encodeURIComponent(sub) + '" class="tree-subdir w-full text-left px-2 py-1.5 pl-6 rounded text-sm text-text-secondary flex items-center justify-between border-l border-transparent no-underline' + activeClass + '">' +
        '<span class="truncate">' + sub + '</span>' +
        '<span class="tree-count ml-2 flex-shrink-0">' + n + '</span>' +
        '</a>';
    });
    if (count === 0) return;
    html += '<div class="tree-module flex items-center gap-2 px-2 py-2 mt-3 first:mt-0 rounded text-xs font-bold text-text-muted">' +
      '<span>' + (mod.icon || '📁') + '</span>' +
      '<span class="flex-1">' + mod.module + '</span>' +
      '<span class="tree-count">' + count + '篇</span>' +
      '</div>' + subdirHtml;
  });
  sidebar.innerHTML = html;
  // 渲染移动端下拉选择器
  buildMobile(pillar, activeCat);
}

function buildMobile(pillar, activeCat) {
  var trigger = document.getElementById('mobile-selector-trigger');
  var dropdown = document.getElementById('mobile-selector-dropdown');
  var textEl = document.getElementById('mobile-selector-text');
  if (!trigger || !dropdown || !window.__ARTICLES__) return;

  var modules = window.__ARTICLES__.pillarModules && window.__ARTICLES__.pillarModules[pillar];
  if (!modules) return;

  var html = '';
  modules.forEach(function(mod) {
    var hasContent = false;
    var subHtml = '';
    (mod.subcategories || []).forEach(function(sub) {
      hasContent = true;
      var activeAttr = (sub === activeCat) ? ' style="background:rgba(34,211,238,0.10);font-weight:600;color:#22d3ee;"' : '';
      subHtml += '<div class="mob-opt" data-val="' + sub + '"' + activeAttr + ' style="padding:10px 14px 10px 24px;font-size:13px;color:var(--ink-primary,#251401);cursor:pointer;border-radius:8px;margin:2px 8px;transition:background .15s;">' + sub + '</div>';
    });
    if (!hasContent) return;
    html += '<div style="padding:6px 14px 4px;font-size:11px;font-weight:700;color:#A80606;letter-spacing:0.5px;border-top:1px solid var(--ink-border,#d4c9b8);margin-top:2px;">' + (mod.icon || '') + ' ' + mod.module + '</div>' + subHtml;
  });
  dropdown.innerHTML = html;

  // 设置当前选中文本
  if (textEl) textEl.textContent = activeCat;

  trigger.addEventListener('click', function(e) {
    e.stopPropagation();
    var open = dropdown.style.display === 'block';
    if (!open) {
      var rect = trigger.getBoundingClientRect();
      var spaceBelow = window.innerHeight - rect.bottom;
      if (spaceBelow < 300) {
        dropdown.style.marginTop = '0';
        dropdown.style.bottom = '100%';
        dropdown.style.marginBottom = '4px';
      } else {
        dropdown.style.marginTop = '4px';
        dropdown.style.bottom = 'auto';
        dropdown.style.marginBottom = '0';
      }
    } else {
      dropdown.style.marginTop = '4px';
      dropdown.style.bottom = 'auto';
      dropdown.style.marginBottom = '0';
    }
    dropdown.style.display = open ? 'none' : 'block';
  });

  dropdown.addEventListener('click', function(e) {
    var opt = e.target.closest('.mob-opt');
    if (!opt) return;
    var val = opt.getAttribute('data-val');
    if (textEl) textEl.textContent = val;
    dropdown.style.display = 'none';
    // 跳转到所选分类
    window.location.href = 'category.html?pillar=' + pillar + '&cat=' + encodeURIComponent(val);
  });

  dropdown.addEventListener('mouseover', function(e) {
    var opt = e.target.closest('.mob-opt');
    if (opt) opt.style.background = 'var(--ink-hover,#e8dfd0)';
  });
  dropdown.addEventListener('mouseout', function(e) {
    var opt = e.target.closest('.mob-opt');
    if (opt) opt.style.background = '';
  });

  document.addEventListener('click', function() {
    dropdown.style.display = 'none';
  });
}

init();
// 加载超时：8 秒后如果页面仍是"加载中..."，显示可操作提示
setTimeout(function() {
  var app = document.getElementById('app');
  if (app && app.innerHTML.indexOf('加载中') !== -1) {
    app.innerHTML =
      '<div class="glass rounded-2xl p-12 text-center fade-in" style="max-width:480px;margin:3rem auto">' +
      '<p class="text-lg" style="color:#f59e0b">⏳ 页面加载超时</p>' +
      '<p class="text-sm mt-2 text-text-muted">数据文件可能较大或网络较慢，<br>请尝试 <a href="javascript:location.reload()" class="underline" style="color:#22d3ee">刷新页面</a></p>' +
      '</div>';
  }
}, 8000);
</script>
