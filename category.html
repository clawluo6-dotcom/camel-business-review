<script>
// ── Category Page Logic ──
const PILLAR_CONFIG = {
  worldview: {
    name: '🌌 世界观 · 哲学思想研究', slug: 'worldview.html', accent: '#22d3ee',
    subAccent: '#06b6d4', accentRgb: '34,211,238',
    pillarName: '一、传统哲学研究'
  },
  social: {
    name: '🏛️ 社会逻辑 · 经济研究', slug: 'social.html', accent: '#f59e0b',
    subAccent: '#d97706', accentRgb: '245,158,11',
    pillarName: '二、经济研究'
  },
  practice: {
    name: '🧘 思想与修行', slug: 'practice.html', accent: '#a855f7',
    subAccent: '#7c3aed', accentRgb: '168,85,247',
    pillarName: '三、思想与修行'
  }
};

function init() {
  const params = new URLSearchParams(window.location.search);
  const pillar = (params.get('pillar') || '').trim();
  const sub_raw = (params.get('sub') || '').trim();  // 兼容 sub 参数

  // 安全解析 cat 参数，防止 decodeURIComponent 出错
  let cat = '';
  const catParam = params.get('cat');
  if (catParam) {
    try {
      cat = decodeURIComponent(catParam).trim();
    } catch (e) {
      cat = catParam.trim(); // 解码失败时使用原始值
    }
  }

  // 调试：显示实际收到的参数值（发布前删掉）
  console.log('[category] pillar=', JSON.stringify(pillar), 'cat=', JSON.stringify(cat));

  if (!pillar || !cat || !PILLAR_CONFIG[pillar]) {
    const msg = !PILLAR_CONFIG[pillar]
      ? `未知 pillar 值：${JSON.stringify(pillar)}，有效值仅为：worldview / social`
      : '未找到分类参数';
    document.getElementById('app').innerHTML = `<div class="empty-state"><p class="text-text-muted text-lg">${msg}</p></div>`;
    return;
  }

  const cfg = PILLAR_CONFIG[pillar];
  document.title = `${cat} — ${cfg.name.replace(/[^\u4e00-\u9fa5]/g,'')} — 骆驼商业本质`;

  try {
    const data = window.__ARTICLES__;
    const articles = data.articles || data;
    // 用 English pillar key 匹配文章的 pillar 字段（不是用中文 pillarName）
    const filtered = articles.filter(a => {
      if (a.pillar !== pillar) return false;
      if (a.id.startsWith('moc-') || (a.title && a.title.startsWith('MOC-'))) return false;
      // 精确匹配 subcategory
      if (a.subcategory === cat) return true;
      // 兼容：cat 参数如果包含额外前缀（如"（一）"），也尝试用 subcategory 反匹配
      if (cat.indexOf(a.subcategory) !== -1) return true;
      if (a.subcategory.indexOf(cat) !== -1) return true;
      return false;
    });
    render(cfg, pillar, cat, filtered);
  } catch (err) {
    document.getElementById('app').innerHTML = `<div class="empty-state"><p class="text-text-muted text-lg">数据加载失败: ${err.message}</p></div>`;
  }
}

function render(cfg, pillar, cat, articles) {
  // 防护：cfg 为 undefined 时给默认值，避免页面出现 "undefined" 字符串
  if (!cfg) {
    document.getElementById('app').innerHTML =
      '<div class="glass rounded-2xl p-12 text-center">' +
      '<p class="text-text-muted text-lg">配置加载失败，请检查 URL 参数 pillar 值是否为 worldview / social / practice</p>' +
      '</div>';
    return;
  }
  const acc = cfg.accent;
  const accDim = cfg.accentRgb;
  let html = '';

  // Breadcrumb
  html += `
  <div class="mb-8">
    <a href="index.html" class="back-link inline-flex items-center gap-2 text-sm text-text-muted hover:opacity-70 transition" style="color:${acc}">
      <span>←</span> <span>返回首页</span>
    </a>
    <span class="text-text-muted mx-2">/</span>
    <a href="${cfg.slug}" class="text-sm hover:underline transition" style="color:${acc}">${cfg.name}</a>
    <span class="text-text-muted mx-2">/</span>
    <span class="text-sm font-semibold" style="color:${acc}">${cat}</span>
  </div>`;

  // Header
  html += `
  <div class="mb-10 fade-in">
    <h2 class="text-3xl font-extrabold mb-2" style="color:${acc}">${cat}</h2>
    <p class="text-text-secondary">共 ${articles.length} 篇文章</p>
  </div>`;

  if (articles.length === 0) {
    html += '<div class="glass rounded-2xl p-12 empty-state"><p class="text-text-muted text-lg">该分类暂无文章，敬请期待</p></div>';
  } else {
    html += '<div class="grid grid-cols-1 md:grid-cols-2 gap-5">';
    articles.forEach((a, i) => {
      const impClass = a.importance >= 5 ? 'importance-5' : a.importance >= 4 ? 'importance-4' : 'importance-3';
      const delay = 0.05 * (i + 1);
      html += `
      <a href="article.html?id=${a.id}" class="glass rounded-xl p-6 glass-hover fade-in ${impClass} block no-underline" style="animation-delay:${delay}s">
        <div class="flex items-center justify-between mb-3">
          <span class="text-[10px] text-text-muted font-mono">${a.date || ''}</span>
          ${a.importance >= 5 ? '<span class="text-[10px] px-2 py-0.5 rounded-full" style="background:rgba(34,211,238,0.12);color:#22d3ee">精选</span>' : ''}
        </div>
        <h3 class="font-semibold text-base mb-2 leading-snug" style="color:${acc}">${a.title}</h3>
        <p class="text-sm text-text-secondary leading-relaxed">${a.summary || ''}</p>
      </a>`;
    });
    html += '</div>';
  }

  document.getElementById('app').innerHTML = html;
}

init();
</script>
