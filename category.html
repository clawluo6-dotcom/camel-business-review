<style>
  @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&family=JetBrains+Mono:wght@400;500;600;700&display=swap');

  .glass { background: rgba(26,31,46,0.7); backdrop-filter: blur(16px); -webkit-backdrop-filter: blur(16px); border: 1px solid rgba(255,255,255,0.06); }
  .glass-hover { transition: all 0.35s cubic-bezier(0.4, 0, 0.2, 1); }
  .glass-hover:hover { background: rgba(36,43,61,0.8); border-color: rgba(255,255,255,0.12); transform: translateY(-3px); box-shadow: 0 12px 40px rgba(0,0,0,0.5); }
  .gradient-text { background: linear-gradient(135deg, #22d3ee, #a855f7); -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text; }
  .bg-grid { background-image: radial-gradient(circle at 1px 1px, rgba(255,255,255,0.03) 1px, transparent 0); background-size: 40px 40px; }
  .bg-glow-top { background: radial-gradient(ellipse 80% 60% at 50% 0%, rgba(34,211,238,0.06) 0%, transparent 70%); }
  .nav-link { position: relative; }
  .nav-link::after { content:''; position:absolute; bottom:-4px; left:0; width:0; height:2px; background: linear-gradient(90deg, #22d3ee, #a855f7); transition: width 0.3s ease; }
  .nav-link:hover::after { width: 100%; }
  .fade-in { animation: fadeIn 0.6s ease-out; }
  @keyframes fadeIn { from { opacity:0; transform:translateY(12px); } to { opacity:1; transform:translateY(0); } }
  .back-link { transition: all 0.3s ease; }
  .back-link:hover { transform: translateX(-4px); }
  .importance-5 { border-left: 3px solid #22d3ee; }
  .importance-4 { border-left: 3px solid #a855f7; }
  .importance-3 { border-left: 3px solid #64748b; }
  .empty-state { min-height: 200px; display: flex; align-items: center; justify-content: center; }
</style>
<script src="articles.js"></script>
</head>
<body class="bg-bg-primary bg-grid min-h-screen bg-glow-top">

<!-- NAV -->
<nav class="sticky top-0 z-50 glass border-b border-white/5">

      <div class="w-8 h-8 rounded-lg bg-gradient-to-br from-accent-cyan to-accent-purple flex items-center justify-center">

      </div>
      <div>
        <h1 class="text-lg font-bold tracking-tight"><span class="gradient-text">骆驼🐫</span> <span class="text-text-secondary font-normal">商业本质</span></h1>
      </div>
    </a>
    <div class="flex items-center gap-5">
      <a href="index.html" class="nav-link text-sm font-medium text-text-secondary hover:text-accent-cyan transition">首页</a>
      <a href="worldview.html" class="nav-link text-sm font-medium text-text-secondary hover:text-accent-cyan transition">世界观</a>

      <a href="ai-news.html" class="nav-link text-sm font-medium text-text-secondary hover:text-accent-emerald transition">AI 速报</a>
      <a href="about.html" class="nav-link text-sm font-medium text-text-secondary hover:text-accent-amber transition">关于</a>
      <a href="admin.html" class="ml-2 px-3 py-1.5 rounded-lg border border-white/10 text-text-muted hover:text-accent-cyan hover:border-accent-cyan/30 transition text-xs font-mono">ADMIN</a>
    </div>
  </div>
</nav>

<!-- Content Area -->
<div class="max-w-7xl mx-auto px-6 pt-12 pb-16">
  <div id="app">
    <div class="text-center text-text-muted py-20">加载中...</div>
  </div>
</div>

<!-- FOOTER -->
<footer class="border-t border-white/5 mt-8 bg-bg-secondary/50">
  <div class="max-w-7xl mx-auto px-6 py-8 flex flex-col md:flex-row items-center justify-between gap-4">
    <div class="flex items-center gap-2 text-sm text-text-muted">
      <span class="gradient-text font-bold">骆驼🐫 商业本质</span>
      <span>·</span>
      <span>认识世界 · 理解社会 · 安顿自己</span>
    </div>
    <div class="flex items-center gap-4 text-xs text-text-muted">
      <a href="index.html" class="hover:text-accent-cyan transition">首页</a>
      <span>·</span>
      <a href="worldview.html" class="hover:text-accent-cyan transition">世界观</a>
      <span>·</span>
      <a href="social.html" class="hover:text-accent-gold transition">社会逻辑</a>
      <span>·</span>
      <a href="practice.html" class="hover:text-accent-purple transition">思想与修行</a>
    </div>
  </div>
</footer>

<script>
// ── Category Page Logic ──
const PILLAR_CONFIG = {
  worldview: {
    name: '🌌 世界观', slug: 'worldview.html', accent: '#22d3ee',
    subAccent: '#06b6d4', accentRgb: '34,211,238'
  },
  social: {
    name: '🏛️ 社会逻辑', slug: 'social.html', accent: '#f59e0b',
    subAccent: '#d97706', accentRgb: '245,158,11'
  },
  practice: {
    name: '🧘 思想与修行', slug: 'practice.html', accent: '#a855f7',
    subAccent: '#7c3aed', accentRgb: '168,85,247'
  }
};

function init() {
  const params = new URLSearchParams(window.location.search);
  const pillar = params.get('pillar') || '';
  const cat = decodeURIComponent(params.get('cat') || '');

  if (!pillar || !cat || !PILLAR_CONFIG[pillar]) {
    document.getElementById('app').innerHTML = '<div class="empty-state"><p class="text-text-muted text-lg">未找到分类参数</p></div>';
    return;
  }

  const cfg = PILLAR_CONFIG[pillar];
  document.title = `${cat} — ${cfg.name.replace(/[^\u4e00-\u9fa5]/g,'')} — 骆驼商业本质`;

  try {
    const data = window.__ARTICLES__;
    const articles = data.articles || data;
    const filtered = articles.filter(a => a.pillar === pillar && a.subcategory === cat);
    render(cfg, pillar, cat, filtered);
  } catch (err) {
    document.getElementById('app').innerHTML = `<div class="empty-state"><p class="text-text-muted text-lg">数据加载失败: ${err.message}</p></div>`;
  }
}

function render(cfg, pillar, cat, articles) {
  const acc = cfg.accent;
  const accDim = cfg.accentRgb;
  let html = '';

  // Breadcrumb
  html += `
  <div class="mb-8">
    <a href="index.html" class="back-link inline-flex items-center gap-2 text-sm text-text-muted hover:opacity-70 transition" style="color:${acc}">
      <span>←</span> <span>返回首页</span>
    </a>
    <span class="text-text-muted mx-2">/</span>
    <a href="${cfg.slug}" class="text-sm hover:underline transition" style="color:${acc}">${cfg.name}</a>
    <span class="text-text-muted mx-2">/</span>
    <span class="text-sm font-semibold" style="color:${acc}">${cat}</span>
  </div>`;

  // Header
  html += `
  <div class="mb-10 fade-in">
    <h2 class="text-3xl font-extrabold mb-2" style="color:${acc}">${cat}</h2>
    <p class="text-text-secondary">共 ${articles.length} 篇文章</p>
  </div>`;

  if (articles.length === 0) {
    html += '<div class="glass rounded-2xl p-12 empty-state"><p class="text-text-muted text-lg">该分类暂无文章，敬请期待</p></div>';
  } else {
    html += '<div class="grid grid-cols-1 md:grid-cols-2 gap-5">';
    articles.forEach((a, i) => {
      const impClass = a.importance >= 5 ? 'importance-5' : a.importance >= 4 ? 'importance-4' : 'importance-3';
      const delay = 0.05 * (i + 1);
      html += `
      <a href="article.html?id=${a.id}" class="glass rounded-xl p-6 glass-hover fade-in ${impClass} block no-underline" style="animation-delay:${delay}s">
        <div class="flex items-center justify-between mb-3">
          <span class="text-[10px] text-text-muted font-mono">${a.date || ''}</span>
          ${a.importance >= 5 ? '<span class="text-[10px] px-2 py-0.5 rounded-full" style="background:rgba(34,211,238,0.12);color:#22d3ee">精选</span>' : ''}
        </div>
        <h3 class="font-semibold text-base mb-2 leading-snug" style="color:${acc}">${a.title}</h3>
        <p class="text-sm text-text-secondary leading-relaxed">${a.summary}</p>
      </a>`;
    });
    html += '</div>';
  }

  document.getElementById('app').innerHTML = html;
}

init();
</script>
</body>
</html>
